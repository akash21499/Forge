                        <svg width="32" height="32" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="#c8956c" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </div>
                      <div style={{fontSize:16,fontWeight:700,color:"#c8956c",fontFamily:"'Outfit',sans-serif"}}>Break Over</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",marginTop:4}}>Ready to get back to it?</div>
                    </div>
                    <button onClick={()=>setFocusSession(p=>({...p,onBreak:false,totalBreakTime:(p.totalBreakTime||0)+p.breakDuration*60,breakElapsed:0,paused:false}))} style={{
                      padding:"14px 32px",borderRadius:12,border:"none",cursor:"pointer",marginTop:16,
                      background:`linear-gradient(145deg, ${t.accentD}, ${t.accent})`,boxShadow:`0 6px 24px ${t.accent}30`,
                      color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Outfit',sans-serif"
                    }}>Resume Focus</button>
                    <button onClick={endFocus} style={{
                      padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.2)",fontSize:10,fontFamily:"'Outfit',sans-serif"
                    }}>End Session</button>
                  </>;
                }

                // Active break
                return <>
                  <div style={{position:"relative",width:200,height:200,marginTop:10}}>
                    <svg width="200" height="200" viewBox="0 0 200 200" style={{transform:"rotate(-90deg)"}}>
                      <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(200,149,108,0.06)" strokeWidth="6"/>
                      <circle cx="100" cy="100" r="80" fill="none" stroke="#c8956c" strokeWidth="6"
                        strokeDasharray={bCirc} strokeDashoffset={bCirc-(bPct/100)*bCirc}
                        strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear",opacity:0.5}}/>
                    </svg>
                    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:36,fontWeight:700,fontFamily:"'Azeret Mono',monospace",color:"#c8956c",letterSpacing:2}}>
                        {String(bMins).padStart(2,"0")}:{String(bSecs).padStart(2,"0")}
                      </span>
                      <span style={{fontSize:10,color:"rgba(200,149,108,0.4)",fontFamily:"'Outfit',sans-serif",marginTop:2}}>break</span>
                    </div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:14,fontWeight:600,color:"#c8956c",fontFamily:"'Outfit',sans-serif"}}>Taking a breather</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.15)",fontFamily:"'Outfit',sans-serif",marginTop:4}}>Stretch, breathe, hydrate</div>
                  </div>
                  {/* Nudge buttons for break */}
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>
                    {[[-30,"-30s"],[-60,"-1m"]].map(([s,l])=>(
                      <button key={l} onClick={()=>setFocusSession(p=>({...p,breakDuration:Math.max(0.5,p.breakDuration+s/60)}))} style={{
                        padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",
                        background:"rgba(229,115,115,0.04)",border:"1px solid rgba(229,115,115,0.08)",
                        color:"#e57373",fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:600
                      }}>{l}</button>
                    ))}
                    {[[30,"+30s"],[60,"+1m"],[120,"+2m"],[300,"+5m"]].map(([s,l])=>(
                      <button key={l} onClick={()=>setFocusSession(p=>({...p,breakDuration:p.breakDuration+s/60}))} style={{
                        padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",
                        background:"rgba(200,149,108,0.04)",border:"1px solid rgba(200,149,108,0.08)",
                        color:"#c8956c",fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:600
                      }}>{l}</button>
                    ))}
                  </div>
                  <button onClick={()=>setFocusSession(p=>({...p,onBreak:false,totalBreakTime:(p.totalBreakTime||0)+(p.breakElapsed||0),breakElapsed:0}))} style={{
                    padding:"12px 28px",borderRadius:10,border:"none",cursor:"pointer",
                    background:"rgba(200,149,108,0.08)",border:"1px solid rgba(200,149,108,0.15)",
                    color:"#c8956c",fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif"
                  }}>End Break Early</button>
                </>;
              })() : <>
              {/* Timer ring */}
              <div style={{position:"relative",width:200,height:200,marginTop:10}}>
                <svg width="200" height="200" viewBox="0 0 200 200" style={{transform:"rotate(-90deg)"}}>
                  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="6"/>
                  {isCountdown?<circle cx="100" cy="100" r="80" fill="none" stroke={isOver?"#34d399":t.accent} strokeWidth="6"
                    strokeDasharray={circumference} strokeDashoffset={circumference-(pct/100)*circumference}
                    strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear"}}/>
                  :<circle cx="100" cy="100" r="80" fill="none" stroke={t.accent} strokeWidth="6"
                    strokeDasharray="8 6" strokeLinecap="round" style={{opacity:0.3}}/>}
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:36,fontWeight:700,fontFamily:"'Azeret Mono',monospace",color:isOver?"#34d399":t.tx,letterSpacing:2}}>
                    {hrs>0?`${String(hrs).padStart(2,"0")}:`:"" }{String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}
                  </span>
                  <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",marginTop:2}}>{isCountdown?(isOver?"Complete":"remaining"):"elapsed"}</span>
                </div>
              </div>

              {/* Event info */}
              <div style={{textAlign:"center"}}>
                <span style={{fontSize:22}}>{focusSession.emoji}</span>
                <div style={{fontSize:14,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif",marginTop:2}}>{focusSession.title}</div>
              </div>

              {/* Controls */}
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <button onClick={()=>setFocusSession(p=>({...p,paused:!p.paused}))} style={{
                  width:56,height:56,borderRadius:16,border:"none",cursor:"pointer",
                  background:focusSession.paused?`rgba(${aR},0.15)`:"rgba(255,255,255,0.04)",
                  border:focusSession.paused?`1.5px solid rgba(${aR},0.3)`:"1.5px solid rgba(255,255,255,0.06)",
                  display:"flex",alignItems:"center",justifyContent:"center"
                }}>
                  {focusSession.paused
                    ?<svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M4 2.5L13 8L4 13.5V2.5Z" fill={t.accent}/></svg>
                    :<svg width="20" height="20" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.4)"/><rect x="9.5" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.4)"/></svg>
                  }
                </button>
                <button onClick={()=>{setFocusElapsed(0);setFocusSession(p=>({...p,paused:true}));}} style={{
                  width:56,height:56,borderRadius:16,border:"none",cursor:"pointer",
                  background:"rgba(255,255,255,0.04)",border:"1.5px solid rgba(255,255,255,0.06)",
                  display:"flex",alignItems:"center",justifyContent:"center"
                }}>
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 0111.5-2.5M14 8a6 6 0 01-11.5 2.5" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" strokeLinecap="round"/><path d="M13.5 2.5v3h-3" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M2.5 13.5v-3h3" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <button onClick={()=>confirm("End this focus session?",endFocus)} style={{
                  width:56,height:56,borderRadius:16,border:"none",cursor:"pointer",
                  background:"rgba(213,0,0,0.06)",border:"1.5px solid rgba(213,0,0,0.12)",
                  display:"flex",alignItems:"center",justifyContent:"center"
                }}>
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="10" height="10" rx="2" fill="#e57373"/></svg>
                </button>
                <button onClick={()=>setFocusSession(p=>({...p,onBreak:true,breakDuration:5,breakElapsed:0,breakStarted:false,paused:true}))} style={{
                  width:56,height:56,borderRadius:16,border:"none",cursor:"pointer",
                  background:"rgba(200,149,108,0.06)",border:"1.5px solid rgba(200,149,108,0.12)",
                  display:"flex",alignItems:"center",justifyContent:"center"
                }}>
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 4h9v5a3 3 0 01-3 3H5a3 3 0 01-3-3V4z" stroke="#c8956c" strokeWidth="1.2"/><path d="M11 5h1.5a1.5 1.5 0 010 3H11" stroke="#c8956c" strokeWidth="1.2"/><path d="M2 14h9" stroke="#c8956c" strokeWidth="1.2" strokeLinecap="round"/><path d="M4 1.5v1M6.5 1.5v1M9 1.5v1" stroke="#c8956c" strokeWidth="1" strokeLinecap="round" opacity="0.4"/></svg>
                </button>
              </div>

              {/* Nudge - reduce row */}
              {isCountdown && <>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>
                {[[-30,"-30s"],[-60,"-1m"],[-120,"-2m"],[-300,"-5m"],[-600,"-10m"]].map(([s,l])=>(
                  <button key={l} onClick={()=>setFocusSession(p=>({...p,duration:Math.max(0,p.duration+s/60)}))} style={{
                    padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",
                    background:"rgba(229,115,115,0.04)",border:"1px solid rgba(229,115,115,0.08)",
                    color:"#e57373",fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:600
                  }}>{l}</button>
                ))}
              </div>
              {/* Nudge - add row */}
              <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center"}}>
                {[[30,"+30s"],[60,"+1m"],[120,"+2m"],[300,"+5m"],[600,"+10m"]].map(([s,l])=>(
                  <button key={l} onClick={()=>setFocusSession(p=>({...p,duration:p.duration+s/60}))} style={{
                    padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",
                    background:`rgba(${aR},0.04)`,border:`1px solid rgba(${aR},0.08)`,
                    color:t.accent,fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:600
                  }}>{l}</button>
                ))}
              </div>
              </>}

              {/* Subtasks */}
              {focusSession.tasks.length>0 && (
                <div style={{width:"100%",marginTop:4}}>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",fontWeight:600,letterSpacing:1,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                    <span>TASKS {tasksD}/{focusSession.tasks.length}</span>
                    <div style={{flex:1,height:2,borderRadius:1,background:"rgba(255,255,255,0.04)",overflow:"hidden"}}>
                      <div style={{width:`${focusSession.tasks.length>0?(tasksD/focusSession.tasks.length)*100:0}%`,height:"100%",background:t.accent,borderRadius:1,transition:"width 0.3s"}}/>
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {focusSession.tasks.map(task=>(
                      <div key={task.id} onClick={()=>setFocusSession(p=>({...p,tasks:p.tasks.map(tt=>tt.id===task.id?{...tt,done:!tt.done}:tt)}))}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,cursor:"pointer",
                          background:task.done?"rgba(52,211,153,0.04)":"rgba(255,255,255,0.02)",
                          border:task.done?"1px solid rgba(52,211,153,0.1)":"1px solid rgba(255,255,255,0.04)"}}>
                        <Chk checked={task.done} color={t.accent} sz={16}/>
                        <span style={{fontSize:12,fontFamily:"'Outfit',sans-serif",color:task.done?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.5)",textDecoration:task.done?"line-through":"none"}}>{task.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              </>}
            </div>;
          })() : (
            <div>
              {/* Header + date strip */}
              <div style={{textAlign:"center",marginBottom:16,marginTop:10}}>
                <h2 style={{fontSize:18,fontWeight:700,color:t.tx,marginBottom:2,fontFamily:"'Outfit',sans-serif"}}>Focus</h2>
              </div>

              <button onClick={()=>startFocus(null)} style={{
                width:"100%",padding:14,borderRadius:12,border:"none",cursor:"pointer",
                background:`rgba(${aR},0.08)`,border:`1px solid rgba(${aR},0.12)`,
                color:t.accent,fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif",
                display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20
              }}>
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" strokeWidth="1.2"/><path d="M8 4.5V8.5L10.5 10" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                New Session
              </button>

              {/* Date strip for log */}
              {(()=>{
                const center=focusLogDate?parseDateStr(focusLogDate):new Date();
                const strip=[];for(let i=-3;i<=3;i++){const d=new Date(center);d.setDate(d.getDate()+i);strip.push(d);}
                const hasLogs=(d)=>focusLog.some(s=>toDateStr(new Date(s.endedAt))===toDateStr(d));
                return <div style={{display:"flex",gap:0,marginBottom:14,alignItems:"center"}}>
                  <button onClick={()=>{const d=new Date(center);d.setDate(d.getDate()-7);setFocusLogDate(toDateStr(d));}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.15)",fontSize:16,padding:"0 4px"}}>&lsaquo;</button>
                  {strip.map((d,i)=>{
                    const ds=toDateStr(d);const isSel=ds===(focusLogDate||todayKey);const isTd=ds===todayKey;
                    return <button key={i} onClick={()=>setFocusLogDate(ds)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 7px",borderRadius:10,border:"none",cursor:"pointer",minWidth:0,flex:1,
                      background:isSel?`rgba(${aR},0.15)`:"transparent",transition:"all 0.15s",flex:1}}>
                      <span style={{fontFamily:"'Outfit',sans-serif",fontSize:8,fontWeight:500,color:isSel?t.accentL:"rgba(255,255,255,0.15)",textTransform:"uppercase"}}>{DAYS[d.getDay()]}</span>
                      <span style={{fontSize:14,fontWeight:isSel?700:500,color:isSel?"#f4f4f5":isTd?t.accent:"rgba(255,255,255,0.3)",fontFamily:"'Outfit',sans-serif"}}>{d.getDate()}</span>
                      <div style={{width:4,height:4,borderRadius:"50%",background:isSel?t.accent:"rgba(255,255,255,0.15)",opacity:hasLogs(d)?1:0}}/>
                    </button>;
                  })}
                  <button onClick={()=>{const d=new Date(center);d.setDate(d.getDate()+7);setFocusLogDate(toDateStr(d));}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.15)",fontSize:16,padding:"0 4px"}}>&rsaquo;</button>
                    <button onClick={()=>setFocusLogDate(todayKey)} style={{background:(focusLogDate||todayKey)===todayKey?`rgba(${aR},0.15)`:"rgba(255,255,255,0.03)",border:`1px solid rgba(${aR},0.12)`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:10,fontWeight:600,marginLeft:12,flexShrink:0,color:(focusLogDate||todayKey)===todayKey?t.accentL:"rgba(255,255,255,0.25)"}}>Today</button>
                </div>;
              })()}

              {/* Day header */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontSize:15,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif"}}>{(focusLogDate||todayKey)===todayKey?"Today":fmtDateShort(focusLogDate||todayKey)}</span>
                {}
                <div style={{flex:1}}/>
                {(()=>{const daySessions=focusLog.filter(s=>toDateStr(new Date(s.endedAt))===(focusLogDate||todayKey));
                  const totalSec=daySessions.reduce((a,s)=>a+s.elapsed,0);const m=Math.floor(totalSec/60);
                  return daySessions.length>0?<span style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'Outfit',sans-serif"}}>{daySessions.length} session{daySessions.length!==1?"s":""}, {m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`}</span>:null;
                })()}
              </div>

              {/* Session log */}
              {(()=>{
                const selDate=focusLogDate||todayKey;
                const daySessions=focusLog.filter(s=>toDateStr(new Date(s.endedAt))===selDate);
                if(daySessions.length===0) return (
                  <div style={{textAlign:"center",padding:"30px 0"}}>
                    <div style={{fontSize:28,marginBottom:8,opacity:0.4}}>🎯</div>
                    <div style={{color:"rgba(255,255,255,0.12)",fontSize:11,fontFamily:"'Outfit',sans-serif"}}>No sessions this day</div>
                  </div>
                );
                return <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {daySessions.map(s=>{
                    const h=Math.floor(s.elapsed/3600);const m=Math.floor((s.elapsed%3600)/60);const sec=s.elapsed%60;
                    const time=new Date(s.endedAt).toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});
                    return (
                      <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
                        <span style={{fontSize:18}}>{s.emoji}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:500,color:t.tx,fontFamily:"'Outfit',sans-serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.title}</div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'Outfit',sans-serif",marginTop:1}}>
                            {time}{s.totalTasks>0?` \u00b7 ${s.tasksCompleted}/${s.totalTasks} tasks`:""}{s.breakTime>0?` \u00b7 ${Math.floor(s.breakTime/60)}m break`:""}
                          </div>
                        </div>
                        <span style={{fontSize:13,fontWeight:700,color:t.accent,fontFamily:"'Azeret Mono',monospace",flexShrink:0}}>{h>0?`${h}:`:""+""}{String(m).padStart(2,"0")}:{String(sec).padStart(2,"0")}</span>
                        <button onClick={()=>setEditingLog({...s,editHrs:Math.floor(s.elapsed/3600),editMins:Math.floor((s.elapsed%3600)/60),editSecs:s.elapsed%60})} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.1)",fontSize:10,padding:"0 2px"}}>
                          <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M11.5 1.5L14.5 4.5M1 15L1.5 11.5L12 1L15 4L4.5 14.5L1 15Z" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        </button>
                        <button onClick={()=>confirm("Delete this session?",()=>setFocusLog(p=>p.filter(x=>x.id!==s.id)))} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.08)",fontSize:14,padding:"0 2px"}}>&times;</button>
                      </div>
                    );
                  })}
                </div>;
              })()}
            </div>
          )}
        </div>
      )}

      {/* Edit Log Modal */}
      {editingLog && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setEditingLog(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:t.bg2,borderRadius:16,padding:"24px",width:"90%",maxWidth:320,border:`1px solid rgba(${aR},0.15)`}}>
            <div style={{fontSize:14,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif",marginBottom:4}}>{editingLog.emoji} {editingLog.title}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",marginBottom:16}}>Edit session duration</div>
            <div style={{display:"flex",gap:10,alignItems:"center",justifyContent:"center",marginBottom:20}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:8,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif"}}>HR</span>
                <input type="number" value={editingLog.editHrs||0} onChange={e=>setEditingLog(p=>({...p,editHrs:Math.max(0,parseInt(e.target.value)||0)}))} style={{
                  width:60,textAlign:"center",background:"rgba(255,255,255,0.04)",border:`1px solid rgba(${aR},0.15)`,borderRadius:10,padding:"10px",
                  color:t.tx,fontSize:20,fontWeight:700,fontFamily:"'Azeret Mono',monospace",outline:"none"
                }}/>
              </div>
              <span style={{fontSize:20,color:"rgba(255,255,255,0.15)",marginTop:16}}>:</span>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:8,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif"}}>MIN</span>
                <input type="number" value={editingLog.editMins} onChange={e=>setEditingLog(p=>({...p,editMins:Math.max(0,parseInt(e.target.value)||0)}))} style={{
                  width:60,textAlign:"center",background:"rgba(255,255,255,0.04)",border:`1px solid rgba(${aR},0.15)`,borderRadius:10,padding:"10px",
                  color:t.tx,fontSize:20,fontWeight:700,fontFamily:"'Azeret Mono',monospace",outline:"none"
                }}/>
              </div>
              <span style={{fontSize:20,color:"rgba(255,255,255,0.15)",marginTop:16}}>:</span>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:8,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif"}}>SEC</span>
                <input type="number" value={editingLog.editSecs} onChange={e=>setEditingLog(p=>({...p,editSecs:Math.min(59,Math.max(0,parseInt(e.target.value)||0))}))} style={{
                  width:60,textAlign:"center",background:"rgba(255,255,255,0.04)",border:`1px solid rgba(${aR},0.15)`,borderRadius:10,padding:"10px",

                const txt=prev.textContent||"";
                const m=txt.match(/^\[(❓|✅|❌|⏳|⏸️)\]\s-\s/);
                if(m && !li.textContent.trim()){
                  li.innerHTML="[❓] -&nbsp;";
                  li.style.listStyleType="none";
                  const range=document.createRange();range.selectNodeContents(li);range.collapse(false);

              }
            },10);

          const li=el?.closest?.("li");

          if(li){
            const txt=li.textContent||"";
            const m=txt.match(/^\[(❓|✅|❌|⏳|⏸️)\]\s-\s?/);
            if(m){
              const rest=txt.slice(m[0].length);li.innerHTML=`[${emoji}] -&nbsp;${rest}`;

              li.innerHTML=`[${emoji}] -&nbsp;${clean}`;
            }
            li.style.listStyleType="none";
            const range=document.createRange();range.selectNodeContents(li);range.collapse(false);
            sel.removeAllRanges();sel.addRange(range);
          } else {
            const block=el?.closest?.("p,div,h1,h2,h3,blockquote")||el;
            const txt=block?.textContent||"";
