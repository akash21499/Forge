          );
          const tbtnW = (label, action, w, active) => (
            <button onMouseDown={e=>{e.preventDefault();action();}} style={{padding:"5px 0",width:w||36,borderRadius:6,border:"none",cursor:"pointer",
              background:active?`rgba(${aR},0.15)`:"rgba(255,255,255,0.04)",
              color:active?t.accent:"rgba(255,255,255,0.4)",fontSize:10,fontWeight:600,
              fontFamily:"'Azeret Mono',monospace",display:"flex",alignItems:"center",justifyContent:"center",
              border:active?`1px solid rgba(${aR},0.2)`:"1px solid transparent"
            }}>{label}</button>
          );

          return (
            <div style={{position:"fixed",inset:0,background:t.bg,zIndex:200,maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}}>
              {/* Header */}
              <div style={{padding:"14px 16px 8px",display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>{if(!noteReadOnly)saveNote();setEditingNote(null);}} style={{background:"none",border:"none",cursor:"pointer",color:t.accent,fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke={t.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  Back
                </button>
                <div style={{flex:1}}/>
                {editingNote._type==="vault"&&<button onClick={()=>setEditingNote(p=>({...p,pinned:!p.pinned}))} style={{padding:"4px 7px",borderRadius:5,border:"none",cursor:"pointer",
                  background:editingNote.pinned?`rgba(${aR},0.1)`:"rgba(255,255,255,0.04)",color:editingNote.pinned?t.accent:"rgba(255,255,255,0.25)",fontSize:13}}>📌</button>}
                <button onMouseDown={e=>{e.preventDefault();exec("undo");}} style={{padding:"4px 7px",borderRadius:5,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.25)",fontSize:12}}>↩</button>
                <button onMouseDown={e=>{e.preventDefault();exec("redo");}} style={{padding:"4px 7px",borderRadius:5,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.25)",fontSize:12}}>↪</button>
                <button onClick={()=>{if(!noteReadOnly)saveNote();setNoteReadOnly(p=>!p);}} style={{padding:"5px 8px",borderRadius:6,border:"none",cursor:"pointer",
                  background:noteReadOnly?"rgba(255,255,255,0.04)":`rgba(${aR},0.1)`,
                  color:noteReadOnly?"rgba(255,255,255,0.3)":t.accent,fontSize:12,lineHeight:0
                }}>{noteReadOnly?<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M11.5 1.5L14.5 4.5M1 15L1.5 11.5L12 1L15 4L4.5 14.5L1 15Z" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>:<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 2.5h14M1 5.5h10M1 8.5h14M1 11.5h8M1 14.5h12" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/></svg>}</button>
                <button onClick={()=>duplicateNote(editingNote)} style={{padding:"5px 8px",borderRadius:6,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.25)",fontSize:12,lineHeight:0}}>
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.1"/><path d="M3 11V3a1.5 1.5 0 011.5-1.5H11" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/></svg>
                </button>
                <button onClick={()=>confirm("Delete this note?",()=>deleteNote(editingNote))} style={{padding:"5px 8px",borderRadius:6,border:"none",cursor:"pointer",background:"rgba(213,0,0,0.06)",color:"#e57373",fontSize:12,lineHeight:0}}>
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.5 4V2.5a1 1 0 011-1h3a1 1 0 011 1V4M6.5 7v4M9.5 7v4" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/><path d="M3.5 4l.5 9a1.5 1.5 0 001.5 1.5h5a1.5 1.5 0 001.5-1.5l.5-9" stroke="currentColor" strokeWidth="1.1"/></svg>
                </button>
              </div>

              {/* Toolbar - sticky, scrollable */}
              {!noteReadOnly && (
                <div style={{padding:"8px 16px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:t.bg}}>
                  <div style={{display:"flex",gap:3,overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",msOverflowStyle:"none"}}>
                    <style>{`[data-toolbar]::-webkit-scrollbar{display:none}`}</style>
                    <div data-toolbar style={{display:"flex",gap:3,flexShrink:0}}>
                      {tbtn(<b>B</b>,()=>exec("bold"),editorFmt.bold)}
                      {tbtn(<em>I</em>,()=>exec("italic"),editorFmt.italic)}
                      {tbtn(<del>S</del>,()=>exec("strikeThrough"),editorFmt.strikeThrough)}
                      <div style={{width:1,background:"rgba(255,255,255,0.06)",margin:"2px 2px"}}/>
                      {tbtnW("H1",()=>exec("formatBlock","h1"),36,editorFmt.block==="h1")}
                      {tbtnW("H2",()=>exec("formatBlock","h2"),36,editorFmt.block==="h2")}
                      {tbtnW("H3",()=>exec("formatBlock","h3"),36,editorFmt.block==="h3")}
                      <div style={{width:1,background:"rgba(255,255,255,0.06)",margin:"2px 2px"}}/>
                      {tbtn(editorFmt.status||"☐",()=>setStatusPickerOpen(p=>!p),statusPickerOpen||!!editorFmt.status)}
                      {tbtn("❝",()=>exec("formatBlock","blockquote"),editorFmt.block==="blockquote")}
                      {tbtn("•",()=>exec("insertUnorderedList"),editorFmt.ul&&!editorFmt.status)}
                      {tbtn("1.",()=>exec("insertOrderedList"),editorFmt.ol)}
                      {tbtnW("⇥",()=>exec("indent"),28)}
                      {tbtnW("⇤",()=>exec("outdent"),28)}
                      <div style={{width:1,background:"rgba(255,255,255,0.06)",margin:"2px 2px"}}/>
                      {tbtnW("─",()=>exec("insertHorizontalRule"),28)}
                      {tbtnW("═",()=>exec("insertHTML",'<div data-dblline style="border-top:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.08);height:4px;margin:16px 0"></div><p></p>'),28)}
                    </div>
                  </div>
                </div>
              )}
              {statusPickerOpen && !noteReadOnly && (
                <div style={{padding:"6px 16px 8px",display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <span style={{fontSize:8,color:"rgba(255,255,255,0.15)",fontFamily:"'Azeret Mono',monospace",marginRight:2}}>STATUS</span>
                  {[["❓","Pending"],["✅","Done"],["❌","Failed"],["⏳","In progress"],["⏸️","Paused"]].map(([em,label])=>(
                    <button key={em} onMouseDown={e=>{e.preventDefault();insertStatus(em);}} style={{
                      display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:7,border:"none",cursor:"pointer",
                      background:editorFmt.status===em?`rgba(${aR},0.15)`:"rgba(255,255,255,0.03)",
                      border:editorFmt.status===em?`1px solid rgba(${aR},0.2)`:"1px solid rgba(255,255,255,0.04)"
                    }}>
                      <span style={{fontSize:14}}>{em}</span>
                      <span style={{fontSize:8,color:editorFmt.status===em?t.accent:"rgba(255,255,255,0.2)",fontFamily:"'Azeret Mono',monospace"}}>{label}</span>
                    </button>
                  ))}
                </div>
              )}

              {/* Editor / Reader */}
              <div style={{flex:1,overflowY:"auto",padding:"12px 16px 20px"}}>
                {noteReadOnly ? (
                  <>
                    <h1 style={{fontSize:22,fontWeight:700,color:t.tx,marginBottom:4,fontFamily:"'Outfit',sans-serif"}}>{editingNote.emoji?editingNote.emoji+" ":""}{editingNote.title||"Untitled"}</h1>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'Azeret Mono',monospace",marginBottom:16}}>
                      {editingNote._type==="journal"&&editingNote.date&&(
                        <span onClick={()=>{if(noteReadOnly){setNoteReadOnly(false);}}} style={{cursor:"pointer",color:t.accent}}>{fmtDateShort(editingNote.date)}</span>
                      )}
                      {editingNote._type==="journal"&&editingNote.date&&" · "}{new Date(editingNote.modifiedAt).toLocaleDateString("en",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
                    </div>
                    <div data-readonly style={{fontSize:14,color:"rgba(255,255,255,0.6)",lineHeight:1.8,fontFamily:"'Outfit',sans-serif"}} dangerouslySetInnerHTML={{__html:editingNote.body||"<p style='color:rgba(255,255,255,0.15)'>Empty note</p>"}}/>
                    <style>{`
                      [data-readonly] ul,[data-readonly] ol{padding-left:20px;margin:4px 0;color:rgba(255,255,255,0.6)}
                      [data-readonly] li{margin:2px 0}
                      [data-readonly] li::marker{color:${t.accent}}
                      [data-readonly] h1{font-size:20px;font-weight:700;color:${t.tx};margin:14px 0 6px}
                      [data-readonly] h2{font-size:17px;font-weight:700;color:${t.tx};margin:12px 0 4px}
                      [data-readonly] h3{font-size:15px;font-weight:600;color:${t.tx};margin:10px 0 4px}
                      [data-readonly] blockquote{border-left:3px solid ${t.accent};padding:4px 12px;margin:6px 0;color:rgba(255,255,255,0.4);font-style:italic}
                      [data-readonly] hr{border:none;height:1px;background:rgba(255,255,255,0.08);margin:16px 0}
                    `}</style>
                  </>
                ) : (
                  <>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                      <button onClick={()=>setNoteEmojiOpen(p=>!p)} style={{
                        width:40,height:40,borderRadius:10,border:"none",cursor:"pointer",flexShrink:0,
                        background:noteEmojiOpen?`rgba(${aR},0.15)`:"transparent",
                        border:noteEmojiOpen?`1.5px solid rgba(${aR},0.3)`:"1.5px solid transparent",
                        fontSize:editingNote.emoji?20:16,display:"flex",alignItems:"center",justifyContent:"center"
                      }}>{editingNote.emoji||<span style={{color:"rgba(255,255,255,0.12)"}}>+</span>}</button>
                      <input value={editingNote.title} onChange={e=>setEditingNote(p=>({...p,title:e.target.value}))} placeholder="Note title..."
                        style={{flex:1,background:"transparent",border:"none",outline:"none",color:t.tx,fontSize:20,fontWeight:700,fontFamily:"'Outfit',sans-serif",padding:0}}/>
                    </div>
                    {noteEmojiOpen && (
                      <div style={{marginBottom:8,padding:"8px",borderRadius:8,background:`rgba(${aR},0.04)`}}>
                        <input value={miniEmojiSearch} onChange={e=>setMiniEmojiSearch(e.target.value)} placeholder="Search emojis..."
                          style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:"6px 8px",color:t.tx,fontSize:11,fontFamily:"'Outfit',sans-serif",outline:"none",marginBottom:6}}/>
                        <div style={{maxHeight:140,overflowY:"auto"}}>
                          <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                            {(miniEmojiSearch.trim()?EMOJI_DATA.filter(([e,kw])=>kw.includes(miniEmojiSearch.toLowerCase())):EMOJI_DATA.slice(0,120)).map(([em])=>(
                              <button key={em} onClick={()=>{setEditingNote(p=>({...p,emoji:em}));setNoteEmojiOpen(false);setMiniEmojiSearch("");}} style={{
                                width:30,height:30,borderRadius:6,border:"none",cursor:"pointer",fontSize:15,
                                display:"flex",alignItems:"center",justifyContent:"center",
                                background:editingNote.emoji===em?`rgba(${aR},0.2)`:"rgba(255,255,255,0.02)"
                              }}>{em}</button>
                            ))}
                          </div>
                        </div>
                        <button onClick={()=>{setEditingNote(p=>({...p,emoji:""}));setNoteEmojiOpen(false);setMiniEmojiSearch("");}} style={{marginTop:4,padding:"3px 8px",borderRadius:5,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.2)",fontSize:9,fontFamily:"'Outfit',sans-serif"}}>Remove</button>
                      </div>
                    )}
                    {editingNote._type==="vault" && (
                      <div style={{display:"flex",gap:4,marginBottom:8,alignItems:"center"}}>
                        <div style={{position:"relative"}}>
                          <button onClick={()=>setEditingNote(p=>({...p,_folderOpen:!p._folderOpen}))} style={{
                            display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:8,border:"none",cursor:"pointer",
                            background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)"
                          }}>
                            <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M1 4v9a2 2 0 002 2h10a2 2 0 002-2V6a2 2 0 00-2-2H8L6.5 2H3a2 2 0 00-2 2z" stroke="rgba(255,255,255,0.3)" strokeWidth="1.1"/></svg>
                            <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontFamily:"'Outfit',sans-serif",fontWeight:500}}>{editingNote.folderId?vaultFolders.find(f=>f.id===editingNote.folderId)?.name||"Home":"Home"}</span>
                            <span style={{fontSize:8,color:"rgba(255,255,255,0.15)"}}>▾</span>
                          </button>
                          {editingNote._folderOpen && (
                            <div style={{position:"absolute",top:32,left:0,background:t.bg2,borderRadius:10,padding:4,border:`1px solid rgba(${aR},0.15)`,boxShadow:"0 8px 24px rgba(0,0,0,0.5)",zIndex:10,minWidth:160,maxHeight:200,overflowY:"auto"}}>
                              {(()=>{
                                const renderLevel=(parentId,depth)=>{
                                  const children=vaultFolders.filter(f=>(f.parentId||null)===parentId);
                                  return children.map(f=>(
                                    <React.Fragment key={f.id}>
                                      <button onClick={()=>setEditingNote(p=>({...p,folderId:f.id,_folderOpen:false}))} style={{
                                        display:"flex",alignItems:"center",gap:6,width:"100%",padding:"8px 10px",paddingLeft:10+depth*16,borderRadius:7,border:"none",cursor:"pointer",textAlign:"left",
                                        background:editingNote.folderId===f.id?`rgba(${aR},0.1)`:"transparent",color:editingNote.folderId===f.id?t.accent:"rgba(255,255,255,0.4)",fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:500
                                      }}>{f.emoji||"📁"} {f.name}</button>
                                      {renderLevel(f.id,depth+1)}
                                    </React.Fragment>
                                  ));
                                };
                                return <>
                                  <button onClick={()=>setEditingNote(p=>({...p,folderId:null,_folderOpen:false}))} style={{
                                    display:"flex",alignItems:"center",gap:6,width:"100%",padding:"8px 10px",borderRadius:7,border:"none",cursor:"pointer",textAlign:"left",
                                    background:!editingNote.folderId?`rgba(${aR},0.1)`:"transparent",color:!editingNote.folderId?t.accent:"rgba(255,255,255,0.4)",fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:500
                                  }}>🏠 Home</button>
                                  {renderLevel(null,0)}
                                </>;
                              })()}
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                    {editingNote._type==="journal" && (
                      <div style={{marginBottom:8}}>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <button onClick={()=>{if(!journalCalOpen){const d=parseDateStr(editingNote.date||dateKey);setCalMonth(d.getMonth());setCalYear(d.getFullYear());}setJournalCalOpen(p=>!p);}} style={{
                            display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",
                            background:journalCalOpen?`rgba(${aR},0.1)`:"rgba(255,255,255,0.04)",
                            border:journalCalOpen?`1px solid rgba(${aR},0.15)`:"1px solid rgba(255,255,255,0.06)"
                          }}>
                            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke={journalCalOpen?t.accent:"rgba(255,255,255,0.3)"} strokeWidth="1.1"/><path d="M1 6H15" stroke={journalCalOpen?t.accent:"rgba(255,255,255,0.3)"} strokeWidth="1.1"/><path d="M5 0.5V3.5M11 0.5V3.5" stroke={journalCalOpen?t.accent:"rgba(255,255,255,0.3)"} strokeWidth="1.1" strokeLinecap="round"/></svg>
                            <span style={{fontSize:11,color:journalCalOpen?t.accent:"rgba(255,255,255,0.4)",fontFamily:"'Outfit',sans-serif",fontWeight:500}}>{editingNote.date===todayKey?"Today":fmtDateShort(editingNote.date)}</span>
                          </button>
                        </div>
                        {journalCalOpen && (()=>{
                          const first=new Date(calYear,calMonth,1);
                          const startDay=first.getDay();
                          const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
                          const weeks=[];let week=Array(startDay).fill(null);
                          for(let d=1;d<=daysInMonth;d++){week.push(d);if(week.length===7){weeks.push(week);week=[];}}
                          if(week.length>0){while(week.length<7)week.push(null);weeks.push(week);}
                          const mNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                          return <div style={{marginTop:8,padding:"12px",borderRadius:12,background:`rgba(${aR},0.04)`,border:`1px solid rgba(${aR},0.08)`}}>
                            <div style={{display:"flex",alignItems:"center",marginBottom:10}}>
                              <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.2)",fontSize:14,padding:"0 8px"}}>‹</button>
                              <span style={{flex:1,textAlign:"center",fontSize:12,fontWeight:600,color:t.tx,fontFamily:"'Outfit',sans-serif"}}>{mNames[calMonth]} {calYear}</span>
                              <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.2)",fontSize:14,padding:"0 8px"}}>›</button>
                            </div>
                            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
                              {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:8,color:"rgba(255,255,255,0.15)",fontFamily:"'Outfit',sans-serif",fontWeight:600,padding:"4px 0"}}>{d}</div>)}
                            </div>
                            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
                              {weeks.flat().map((d,i)=>{
                                if(!d) return <div key={i}/>;
                                const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                                const isSel=ds===editingNote.date;const isTd=ds===todayKey;
                                const hasEntry=journalEntries.some(e=>e.date===ds&&e.id!==editingNote.id);
                                return <button key={i} onClick={()=>{setEditingNote(p=>({...p,date:ds}));setJournalCalOpen(false);}} style={{
                                  width:"100%",aspectRatio:"1",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:isSel?700:400,
                                  fontFamily:"'Outfit',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,
                                  background:isSel?`rgba(${aR},0.2)`:isTd?`rgba(${aR},0.06)`:"transparent",
                                  color:isSel?t.accent:isTd?t.accentL:"rgba(255,255,255,0.35)",
                                  border:isSel?`1.5px solid rgba(${aR},0.3)`:"1.5px solid transparent"
                                }}>{d}{hasEntry&&<div style={{width:3,height:3,borderRadius:"50%",background:isSel?t.accent:"rgba(255,255,255,0.15)"}}/>}</button>;
                              })}
                            </div>
                            <button onClick={()=>{setEditingNote(p=>({...p,date:todayKey}));setJournalCalOpen(false);setCalMonth(new Date().getMonth());setCalYear(new Date().getFullYear());}} style={{
                              width:"100%",marginTop:8,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",
                              background:`rgba(${aR},0.06)`,color:t.accent,fontSize:10,fontWeight:600,fontFamily:"'Outfit',sans-serif"
                            }}>Today</button>
                          </div>;
                        })()}
                      </div>
                    )}
                    <div key={editingNote.id} ref={el=>{
                      editorRef.current=el;
                      if(el&&!el.dataset.init){el.innerHTML=editingNote.body||"";el.dataset.init="1";}
                    }} contentEditable dir="ltr" suppressContentEditableWarning
                      onKeyDown={handleEditorKeyDown} onBlur={syncBody}
                      data-placeholder="Start writing..."
                      style={{minHeight:300,outline:"none",color:"rgba(255,255,255,0.6)",fontSize:14,fontFamily:"'Outfit',sans-serif",lineHeight:1.8,
                        padding:0,caretColor:t.accent,direction:"ltr",textAlign:"left"}}/>
                    <style>{`
                      [data-toolbar]::-webkit-scrollbar{display:none}
                      [contenteditable]:empty:before{content:attr(data-placeholder);color:rgba(255,255,255,0.15);pointer-events:none}
                      [contenteditable] h1{font-size:20px;font-weight:700;color:${t.tx};margin:14px 0 6px}
                      [contenteditable] h2{font-size:17px;font-weight:700;color:${t.tx};margin:12px 0 4px}
                      [contenteditable] h3{font-size:15px;font-weight:600;color:${t.tx};margin:10px 0 4px}
                      [contenteditable] blockquote{border-left:3px solid ${t.accent};padding:4px 12px;margin:6px 0;color:rgba(255,255,255,0.4);font-style:italic}
                      [contenteditable] ul,[contenteditable] ol{padding-left:24px;margin:4px 0;color:rgba(255,255,255,0.6)}
                      [contenteditable] ul{list-style-type:disc}
                      [contenteditable] ul ul{list-style-type:circle}
                      [contenteditable] ul ul ul{list-style-type:square}
                      [contenteditable] ol{list-style-type:decimal}
                      [contenteditable] ol ol{list-style-type:lower-alpha}
                      [contenteditable] ol ol ol{list-style-type:lower-roman}
                      [contenteditable] li{margin:2px 0;color:rgba(255,255,255,0.6)}
                      [contenteditable] li::marker{color:${t.accent};font-weight:700}
                      [contenteditable] code{background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-family:'Azeret Mono',monospace;font-size:0.9em}
                      [contenteditable] hr{border:none;height:1px;background:rgba(255,255,255,0.08);margin:16px 0}
                    `}</style>
                  </>
                )}
              </div>
              {!noteReadOnly && (
                <div style={{padding:"10px 16px 16px"}}>
                  <button onClick={saveNote} style={{width:"100%",padding:13,borderRadius:12,border:"none",cursor:"pointer",
                    background:`rgba(${aR},0.15)`,color:t.accent,fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif"
                  }}>Save Note</button>
                </div>
              )}
            </div>
          );
        }

        // ── VAULT LIST HELPERS ──
        const currentFolder = vaultFolderId ? vaultFolders.find(f=>f.id===vaultFolderId) : null;
        const folderNotes = vaultNotes.filter(n=>n.folderId===(vaultFolderId||null));
        const sortedNotes = [...folderNotes].sort((a,b)=>{
          if(a.pinned&&!b.pinned) return -1; if(!a.pinned&&b.pinned) return 1;
          if(vaultSort==="custom") return (a.sortOrder||0)-(b.sortOrder||0);
          if(vaultSort==="title") return (a.title||"").localeCompare(b.title||"");
          if(vaultSort==="created") return new Date(b.createdAt)-new Date(a.createdAt);
          return new Date(b.modifiedAt)-new Date(a.modifiedAt);
        });
        const searchResults = notesSearch.trim() ? [...vaultNotes,...journalEntries].filter(n=>{
          const q=notesSearch.toLowerCase();
          const bodyText=n.body?(()=>{const d=document.createElement("div");d.innerHTML=n.body;return d.textContent||"";})():"";
          return (n.title||"").toLowerCase().includes(q)||bodyText.toLowerCase().includes(q);
        }) : null;

        // ── JOURNAL HELPERS ──
        const journalDates = [...new Set(journalEntries.map(e=>e.date))].sort((a,b)=>b.localeCompare(a));

        // ── NOTE CARD ──
        const NoteCard = (note, i, isStack) => {
          const bodyText=note.body?(()=>{const d=document.createElement("div");d.innerHTML=note.body;return(d.textContent||"").trim().substring(0,80);})():"";
          const c = note.labelId ? getLabel(note.labelId) : null;
          const isJ = note._type==="journal";
          return (
            <div key={note.id} style={{borderRadius:12,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",
              borderLeft:c?`3px solid ${c.hex}`:"3px solid transparent",overflow:"hidden"}}>
              <div onClick={()=>{setEditingNote({...note});setNoteReadOnly(true);}} style={{padding:"12px 14px",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:bodyText?4:0}}>
                  {note.pinned&&<span style={{fontSize:10}}>📌</span>}
                  <span style={{fontSize:14,fontWeight:600,color:t.tx,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Outfit',sans-serif"}}>{note.emoji?note.emoji+" ":""}{note.title||"Untitled"}</span>
                  <span style={{fontSize:9,color:"rgba(255,255,255,0.1)",fontFamily:"'Outfit',sans-serif",flexShrink:0}}>{new Date(note.modifiedAt).toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"})}</span>
                </div>
                {bodyText&&<div style={{fontSize:11,color:"rgba(255,255,255,0.2)",lineHeight:1.5,fontFamily:"'Outfit',sans-serif",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{bodyText}</div>}
              </div>
              {isStack && (
                <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.03)"}}>
                  {isJ ? <button onClick={e=>{e.stopPropagation();setMovingNote({...note,_type:"journal"});}} style={{flex:1,padding:"8px",background:"none",border:"none",borderRight:"1px solid rgba(255,255,255,0.03)",cursor:"pointer",color:"rgba(255,255,255,0.2)",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" strokeWidth="1.1"/><path d="M1 6H15" stroke="currentColor" strokeWidth="1.1"/><path d="M5 0.5V3.5M11 0.5V3.5" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/></svg>
                    <span style={{fontSize:9,fontFamily:"'Outfit',sans-serif"}}>Move</span>
                  </button> : <button onClick={e=>{e.stopPropagation();setMovingNote({...note,_type:"vault"});}} style={{flex:1,padding:"8px",background:"none",border:"none",borderRight:"1px solid rgba(255,255,255,0.03)",cursor:"pointer",color:"rgba(255,255,255,0.2)",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M1 4v9a2 2 0 002 2h10a2 2 0 002-2V6a2 2 0 00-2-2H8L6.5 2H3a2 2 0 00-2 2z" stroke="currentColor" strokeWidth="1.1"/></svg>
                    <span style={{fontSize:9,fontFamily:"'Outfit',sans-serif"}}>Move</span>
                  </button>}
                  <button onClick={e=>{e.stopPropagation();
                    const dup={...note,id:`note-${Date.now()}`,title:(()=>{const base=note.title||"Untitled";const all=isJ?journalEntries:vaultNotes;let n=1;while(all.some(x=>x.title===base+" "+n))n++;return base+" "+n;})(),modifiedAt:new Date().toISOString()};
                    if(isJ) setJournalEntries(p=>[dup,...p]); else setVaultNotes(p=>[dup,...p]);
                  }} style={{flex:1,padding:"8px",background:"none",border:"none",borderRight:"1px solid rgba(255,255,255,0.03)",cursor:"pointer",color:"rgba(255,255,255,0.2)",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.1"/><path d="M3 11V3a1.5 1.5 0 011.5-1.5H11" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/></svg>
                    <span style={{fontSize:9,fontFamily:"'Outfit',sans-serif"}}>Duplicate</span>
                  </button>
                  <button onClick={e=>{e.stopPropagation();confirm("Delete this note?",()=>{
                    setNotesTrash(p=>[{...note,deletedAt:new Date().toISOString()},...p]);
                    if(isJ) setJournalEntries(p=>p.filter(x=>x.id!==note.id)); else setVaultNotes(p=>p.filter(x=>x.id!==note.id));
                  });}} style={{flex:1,padding:"8px",background:"none",border:"none",cursor:"pointer",color:"#e57373",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.5 4V2.5a1 1 0 011-1h3a1 1 0 011 1V4M6.5 7v4M9.5 7v4" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/><path d="M3.5 4l.5 9a1.5 1.5 0 001.5 1.5h5a1.5 1.5 0 001.5-1.5l.5-9" stroke="currentColor" strokeWidth="1.1"/></svg>
                    <span style={{fontSize:9,fontFamily:"'Outfit',sans-serif"}}>Delete</span>
                  </button>
                </div>
              )}
            </div>
          );
        };

        return (
          <div style={{position:"fixed",inset:0,background:t.bg,zIndex:50,maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",paddingBottom:56}}>
            {/* Header */}
            <div style={{padding:"14px 16px 0"}}>
              <div style={{position:"relative",marginBottom:10}}>
                <input value={notesSearch} onChange={e=>setNotesSearch(e.target.value)} placeholder="Search notes..."
                  style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"9px 12px 9px 32px",color:t.tx,fontSize:12,fontFamily:"'Outfit',sans-serif",outline:"none"}}/>
                <svg style={{position:"absolute",left:10,top:10}} width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="rgba(255,255,255,0.15)" strokeWidth="1.2"/><path d="M11 11l3.5 3.5" stroke="rgba(255,255,255,0.15)" strokeWidth="1.2" strokeLinecap="round"/></svg>
              </div>
              {!searchResults && <div style={{display:"flex",background:`rgba(${aR},0.05)`,borderRadius:10,padding:3,border:`1px solid rgba(${aR},0.08)`,marginBottom:8}}>
                {["vault","journal"].map(tab=>(
                  <button key={tab} onClick={()=>setNotesTab(tab)} style={{flex:1,padding:"7px 0",border:"none",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif",textTransform:"capitalize",background:notesTab===tab?`rgba(${aR},0.12)`:"transparent",color:notesTab===tab?t.accentL:"rgba(255,255,255,0.25)",transition:"all 0.2s"}}>{tab}</button>
                ))}
              </div>}
            </div>

            {searchResults ? (
              <div style={{flex:1,overflowY:"auto",padding:"0 16px 20px"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",marginBottom:8}}>{searchResults.length} result{searchResults.length!==1?"s":""}</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {searchResults.map((n,i)=>NoteCard(n,i,false))}
                </div>
              </div>
            ) : notesTab==="vault" ? (
              <div style={{flex:1,overflowY:"auto",padding:"0 16px 20px"}}>
                {/* Vault header */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  {vaultFolderId ? <>
                    <button onClick={()=>setVaultFolderId(currentFolder?.parentId||null)} style={{background:"none",border:"none",cursor:"pointer",color:t.accent,fontSize:12,display:"flex",alignItems:"center",gap:3}}>
                      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke={t.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </button>
                    <button onClick={()=>setFolderEmojiOpen(p=>!p)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,padding:0,lineHeight:1}}>{currentFolder?.emoji||"📁"}</button>
                    <span style={{fontSize:15,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif"}}>{currentFolder?.name}</span>
                  </> : <span style={{fontSize:15,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif"}}>Vault</span>}
                  <div style={{flex:1}}/>
                  <button onClick={()=>setVaultView(p=>p==="stack"?"list":"stack")} style={{width:28,height:28,borderRadius:7,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.25)",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {vaultView==="stack"?<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 3h14M1 8h14M1 13h14" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>:<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" strokeWidth="1.1"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" strokeWidth="1.1"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" strokeWidth="1.1"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" strokeWidth="1.1"/></svg>}
                  </button>
                  <div style={{position:"relative"}}>
                    <button onClick={()=>setVaultSort(p=>{
                      const next=p==="modified"?"created":p==="created"?"title":p==="title"?"custom":"modified";
                      if(next==="custom"){
                        // Assign initial sortOrder from current sort
                        const sorted=[...folderNotes].sort((a,b)=>{
                          if(a.pinned&&!b.pinned) return -1;if(!a.pinned&&b.pinned) return 1;
                          if(p==="title") return (a.title||"").localeCompare(b.title||"");
                          if(p==="created") return new Date(b.createdAt)-new Date(a.createdAt);
                          return new Date(b.modifiedAt)-new Date(a.modifiedAt);
                        });
                        const ids=sorted.map(n=>n.id);
                        setVaultNotes(prev=>prev.map(n=>ids.includes(n.id)?{...n,sortOrder:ids.indexOf(n.id)}:n));
                      }
                      return next;
                    })} style={{
                      padding:"6px 10px",borderRadius:7,border:"none",cursor:"pointer",
                      background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",
                      display:"flex",alignItems:"center",gap:4
                    }}>
                      <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="rgba(255,255,255,0.25)" strokeWidth="1.2" strokeLinecap="round"/></svg>
                      <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'Outfit',sans-serif",fontWeight:500}}>{vaultSort==="modified"?"Recent":vaultSort==="created"?"Oldest":vaultSort==="title"?"A-Z":"Custom"}</span>
                    </button>
                  </div>
                  <button onClick={()=>newVaultNote(vaultFolderId)} style={{width:34,height:34,borderRadius:10,border:"none",cursor:"pointer",background:`rgba(${aR},0.1)`,color:t.accent,fontSize:20,fontWeight:300,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>

                {folderEmojiOpen && vaultFolderId && (
                  <div style={{marginBottom:12,padding:"8px",borderRadius:10,background:`rgba(${aR},0.04)`,border:`1px solid rgba(${aR},0.08)`}}>
                    <input value={miniEmojiSearch} onChange={e=>setMiniEmojiSearch(e.target.value)} placeholder="Search emojis..."
                      style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:"6px 8px",color:t.tx,fontSize:11,fontFamily:"'Outfit',sans-serif",outline:"none",marginBottom:6}}/>
                    <div style={{maxHeight:120,overflowY:"auto"}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                        {(miniEmojiSearch.trim()?EMOJI_DATA.filter(([e,kw])=>kw.includes(miniEmojiSearch.toLowerCase())):EMOJI_DATA.slice(0,120)).map(([em])=>(
                          <button key={em} onClick={()=>{setVaultFolders(p=>p.map(f=>f.id===vaultFolderId?{...f,emoji:em}:f));setFolderEmojiOpen(false);setMiniEmojiSearch("");}} style={{
                            width:30,height:30,borderRadius:6,border:"none",cursor:"pointer",fontSize:15,
                            display:"flex",alignItems:"center",justifyContent:"center",
                            background:currentFolder?.emoji===em?`rgba(${aR},0.2)`:"rgba(255,255,255,0.02)"
                          }}>{em}</button>
                        ))}
                      </div>
                    </div>
                    <button onClick={()=>{setVaultFolders(p=>p.map(f=>f.id===vaultFolderId?{...f,emoji:"📁"}:f));setFolderEmojiOpen(false);setMiniEmojiSearch("");}} style={{marginTop:4,padding:"3px 8px",borderRadius:5,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.03)",color:"rgba(255,255,255,0.2)",fontSize:9,fontFamily:"'Outfit',sans-serif"}}>Reset to default</button>
                  </div>
                )}

                {/* Folders */}
                {(()=>{
                  const subFolders=vaultFolders.filter(f=>(f.parentId||null)===(vaultFolderId||null));
                  return (subFolders.length>0||true) ? <>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:14}}>
                      {subFolders.map(f=>{
                        const count=vaultNotes.filter(n=>n.folderId===f.id).length+vaultFolders.filter(sf=>sf.parentId===f.id).length;
                        return <button key={f.id} onClick={()=>setVaultFolderId(f.id)} style={{display:"flex",flexDirection:"column",gap:6,padding:"14px",borderRadius:12,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",textAlign:"left",transition:"all 0.15s"}}>
                          <span style={{fontSize:24}}>{f.emoji||"📁"}</span>
                          <div>
                            <div style={{fontSize:12,fontWeight:600,color:t.tx,fontFamily:"'Outfit',sans-serif"}}>{f.name}</div>
                            <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",fontFamily:"'Outfit',sans-serif",marginTop:2}}>{count} item{count!==1?"s":""}</div>
                          </div>
                        </button>;
                      })}
                      <button onClick={()=>{setShowFolderCreate(true);setFolderName("");}} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:"14px",borderRadius:12,border:"none",cursor:"pointer",background:`rgba(${aR},0.03)`,border:`1px dashed rgba(${aR},0.12)`,minHeight:80}}>
                        <span style={{fontSize:18,color:t.accent,fontWeight:300}}>+</span>
                        <span style={{fontSize:9,color:t.accent,fontFamily:"'Outfit',sans-serif",fontWeight:500}}>New folder</span>
                      </button>
                    </div>
                    {showFolderCreate && (
                      <div style={{display:"flex",gap:6,marginBottom:14}}>
                        <input value={folderName} onChange={e=>setFolderName(e.target.value)} placeholder="Folder name..." autoFocus
                          style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 12px",color:t.tx,fontSize:13,fontFamily:"'Outfit',sans-serif",outline:"none"}}/>
                        <button onClick={()=>{if(folderName.trim()){setVaultFolders(p=>[...p,{id:`folder-${Date.now()}`,name:folderName.trim(),emoji:"📁",parentId:vaultFolderId||null}]);setShowFolderCreate(false);}}} style={{padding:"10px 16px",borderRadius:10,border:"none",cursor:"pointer",background:`rgba(${aR},0.12)`,color:t.accent,fontSize:11,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>Create</button>
                        <button onClick={()=>setShowFolderCreate(false)} style={{width:40,borderRadius:10,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.3)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                      </div>
                    )}
                  </> : null;
                })()}

                {/* Folder actions */}
                {vaultFolderId && currentFolder && (
                  <div style={{display:"flex",gap:6,marginBottom:12}}>
                    <button onClick={()=>confirm(`Delete folder "${currentFolder.name}" and all notes inside?`,()=>{
                      setVaultNotes(p=>{const inFolder=p.filter(n=>n.folderId===vaultFolderId);inFolder.forEach(n=>setNotesTrash(tr=>[{...n,deletedAt:new Date().toISOString()},...tr]));return p.filter(n=>n.folderId!==vaultFolderId);});
                      setVaultFolders(p=>p.filter(f=>f.id!==vaultFolderId));setVaultFolderId(null);
                    })} style={{padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",background:"rgba(213,0,0,0.05)",color:"#e57373",fontSize:10,fontWeight:500,fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                      <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.5 4V2.5a1 1 0 011-1h3a1 1 0 011 1V4M6.5 7v4M9.5 7v4" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/><path d="M3.5 4l.5 9a1.5 1.5 0 001.5 1.5h5a1.5 1.5 0 001.5-1.5l.5-9" stroke="currentColor" strokeWidth="1.1"/></svg>
                      Delete folder
                    </button>
                  </div>
                )}

                {/* Notes list */}
                <div style={{display:"flex",flexDirection:"column",gap:vaultView==="stack"?8:4}}>
                  {sortedNotes.map((n,i)=>(
                    vaultSort==="custom" ? (
                      <div key={n.id} style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                        <div style={{display:"flex",flexDirection:"column",gap:3,paddingTop:12,flexShrink:0}}>
                          <button onClick={()=>{
                            if(i===0) return;
                            const prev=sortedNotes[i-1];
                            const aOrd=n.sortOrder||0;const bOrd=prev.sortOrder||0;
                            setVaultNotes(p=>p.map(x=>x.id===n.id?{...x,sortOrder:bOrd}:x.id===prev.id?{...x,sortOrder:aOrd}:x));
                          }} style={{width:22,height:22,borderRadius:6,border:"none",cursor:i===0?"default":"pointer",
                            background:i===0?"transparent":`rgba(${aR},0.06)`,color:i===0?"rgba(255,255,255,0.06)":t.accent,
                            fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
                          <button onClick={()=>{
                            if(i>=sortedNotes.length-1) return;
                            const next=sortedNotes[i+1];
                            const aOrd=n.sortOrder||0;const bOrd=next.sortOrder||0;
                            setVaultNotes(p=>p.map(x=>x.id===n.id?{...x,sortOrder:bOrd}:x.id===next.id?{...x,sortOrder:aOrd}:x));
                          }} style={{width:22,height:22,borderRadius:6,border:"none",cursor:i>=sortedNotes.length-1?"default":"pointer",
                            background:i>=sortedNotes.length-1?"transparent":`rgba(${aR},0.06)`,color:i>=sortedNotes.length-1?"rgba(255,255,255,0.06)":t.accent,
                            fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>↓</button>
                        </div>
                        <div style={{flex:1,minWidth:0}}>{NoteCard({...n,_type:"vault"},i,vaultView==="stack")}</div>
                      </div>
                    ) : NoteCard({...n,_type:"vault"},i,vaultView==="stack")
                  ))}
                </div>
                {sortedNotes.length===0 && !showFolderCreate && (
                  <div style={{textAlign:"center",padding:"40px 0"}}>
                    <div style={{fontSize:32,marginBottom:8,opacity:0.5}}>📂</div>
                    <div style={{color:"rgba(255,255,255,0.12)",fontSize:12,fontFamily:"'Outfit',sans-serif"}}>{vaultFolderId?"This folder is empty":"No notes yet"}</div>
                    <button onClick={()=>newVaultNote(vaultFolderId)} style={{marginTop:12,padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",background:`rgba(${aR},0.08)`,color:t.accent,fontSize:11,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>Create a note</button>
                  </div>
                )}
              </div>
            ) : (
              <div style={{flex:1,overflowY:"auto",padding:"0 16px 20px"}}>
                {/* Date strip */}
                {(()=>{
                  const center=journalDate?parseDateStr(journalDate):new Date();
                  const strip=[];for(let i=-3;i<=3;i++){const d=new Date(center);d.setDate(d.getDate()+i);strip.push(d);}
                  const hasEntries=(d)=>journalEntries.some(e=>e.date===toDateStr(d));
                  return <div style={{display:"flex",gap:0,marginBottom:14,alignItems:"center"}}>
                    <button onClick={()=>{const d=new Date(center);d.setDate(d.getDate()-7);setJournalDate(toDateStr(d));}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.15)",fontSize:16,padding:"0 4px"}}>&lsaquo;</button>
                    {strip.map((d,i)=>{
                      const ds=toDateStr(d);const isSel=ds===(journalDate||todayKey);const isTd=ds===todayKey;
                      return <button key={i} onClick={()=>setJournalDate(ds)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 7px",borderRadius:10,border:"none",cursor:"pointer",minWidth:0,flex:1,
                        background:isSel?`rgba(${aR},0.15)`:"transparent",transition:"all 0.15s"}}>
                        <span style={{fontFamily:"'Outfit',sans-serif",fontSize:8,fontWeight:500,color:isSel?t.accentL:"rgba(255,255,255,0.15)",textTransform:"uppercase"}}>{DAYS[d.getDay()]}</span>
                        <span style={{fontSize:14,fontWeight:isSel?700:500,color:isSel?"#f4f4f5":isTd?t.accent:"rgba(255,255,255,0.3)",fontFamily:"'Outfit',sans-serif"}}>{d.getDate()}</span>
                        {hasEntries(d)&&<div style={{width:4,height:4,borderRadius:"50%",background:isSel?t.accent:"rgba(255,255,255,0.15)"}}/>}
                      </button>;
                    })}
                    <button onClick={()=>{const d=new Date(center);d.setDate(d.getDate()+7);setJournalDate(toDateStr(d));}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.15)",fontSize:16,padding:"0 4px"}}>&rsaquo;</button>
                    <button onClick={()=>setJournalDate(todayKey)} style={{background:(journalDate||todayKey)===todayKey?`rgba(${aR},0.15)`:"rgba(255,255,255,0.03)",border:`1px solid rgba(${aR},0.12)`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:10,fontWeight:600,marginLeft:12,flexShrink:0,color:(journalDate||todayKey)===todayKey?t.accentL:"rgba(255,255,255,0.25)"}}>Today</button>
                  </div>;
                })()}

                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <span style={{fontSize:15,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif"}}>{(journalDate||todayKey)===todayKey?"Today":fmtDateShort(journalDate||todayKey)}</span>
                  {}
                  <div style={{flex:1}}/>
                  <button onClick={()=>newJournalEntry(journalDate||todayKey)} style={{width:34,height:34,borderRadius:10,border:"none",cursor:"pointer",background:`rgba(${aR},0.1)`,color:t.accent,fontSize:20,fontWeight:300,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>

                {(()=>{
                  const selDate=journalDate||todayKey;
                  const filtered=journalEntries.filter(e=>e.date===selDate).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
                  if(filtered.length===0) return (
                    <div style={{textAlign:"center",padding:"40px 0"}}>
                      <div style={{fontSize:32,marginBottom:8,opacity:0.5}}>📓</div>
                      <div style={{color:"rgba(255,255,255,0.12)",fontSize:12,fontFamily:"'Outfit',sans-serif"}}>No entries for this day</div>
                      <button onClick={()=>newJournalEntry(selDate)} style={{marginTop:12,padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",background:`rgba(${aR},0.08)`,color:t.accent,fontSize:11,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>Write something</button>
                    </div>
                  );
                  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {filtered.map((n,i)=>(
                      <div key={n.id} style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                        <div style={{display:"flex",flexDirection:"column",gap:3,paddingTop:12,flexShrink:0}}>
                          <button onClick={()=>{
                            if(i===0) return;
                            const prev=filtered[i-1];
                            setJournalEntries(p=>p.map(x=>x.id===n.id?{...x,createdAt:prev.createdAt}:x.id===prev.id?{...x,createdAt:n.createdAt}:x));
                          }} style={{width:22,height:22,borderRadius:6,border:"none",cursor:i===0?"default":"pointer",
                            background:i===0?"transparent":`rgba(${aR},0.06)`,color:i===0?"rgba(255,255,255,0.06)":t.accent,
                            fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>
                          <button onClick={()=>{
                            if(i>=filtered.length-1) return;
                            const next=filtered[i+1];
                            setJournalEntries(p=>p.map(x=>x.id===n.id?{...x,createdAt:next.createdAt}:x.id===next.id?{...x,createdAt:n.createdAt}:x));
                          }} style={{width:22,height:22,borderRadius:6,border:"none",cursor:i>=filtered.length-1?"default":"pointer",
                            background:i>=filtered.length-1?"transparent":`rgba(${aR},0.06)`,color:i>=filtered.length-1?"rgba(255,255,255,0.06)":t.accent,
                            fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>↓</button>
                        </div>
                        <div style={{flex:1,minWidth:0}}>{NoteCard({...n,_type:"journal"},i,true)}</div>
                      </div>
                    ))}
                  </div>;
                })()}
              </div>
            )}
          </div>
        );
      })()}
      {DetailPopup()}

      {/* Mark Popup */}
      {markPopup && (
        <div onClick={()=>setMarkPopup(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:t.bg2,borderRadius:14,padding:"8px",minWidth:180,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.06)"}}>
            <button onClick={()=>{
              if(markPopup.type==="event") toggleAllTasks(markPopup.id);
              else setHabits(p=>p.map(hb=>hb.id===markPopup.id?{...hb,log:{...hb.log,[markPopup.date]:{done:true,manual:true}}}:hb));
              setMarkPopup(null);
            }} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",cursor:"pointer",background:"rgba(52,211,153,0.06)",
              color:"#34d399",fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="#34d399" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Mark as Completed
            </button>
            <button onClick={()=>{
              if(markPopup.type==="event") failEvent(markPopup.id);
              else {
                setHabits(p=>p.map(hb=>hb.id===markPopup.id?{...hb,log:{...hb.log,[markPopup.date]:{failed:true}}}:hb));
                setReflections(p=>({...p,[markPopup.date]:{...(p[markPopup.date]||{}),[markPopup.id]:{type:"habit",emoji:markPopup.emoji,title:markPopup.title,reason:""}}}));
              }
              setMarkPopup(null);
            }} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",cursor:"pointer",background:"rgba(213,0,0,0.05)",
              color:"#e57373",fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",gap:8}}>
              <svg width="14" height="14" viewBox="0 0 10 10" fill="none"><path d="M2 2L8 8M8 2L2 8" stroke="#e57373" strokeWidth="1.5" strokeLinecap="round"/></svg>
              Mark as Failed
            </button>
          </div>
        </div>
      )}

      {/* Habit Detail Popup */}
      {selectedHabit && (()=>{
        const h=habits.find(hb=>hb.id===selectedHabit);
        if(!h) return null;
        const selD=habitDate||todayKey;const selDate=parseDateStr(selD);
        const done=h.log?.[selD]?.done;
        const lbls=(h.linkedLabels||[]).map(lid=>getLabel(lid));const lbl=lbls[0]||null;
        let streak=0;const d2=new Date(selDate);for(let i=0;i<365;i++){if(h.log?.[toDateStr(d2)]?.done)streak++;else if(i>0)break;d2.setDate(d2.getDate()-1);}
        let best=0;let cur=0;const logDates=Object.keys(h.log||{}).sort();logDates.forEach(d3=>{if(h.log[d3]?.done){cur++;if(cur>best)best=cur;}else cur=0;});
        const totalDone=Object.values(h.log||{}).filter(v=>v?.done).length;
        const dayEvents=allEvents.filter(e=>e.startDate===selD);
        const linkedEvs=(h.linkedLabels||[]).length>0?dayEvents.filter(e=>(h.linkedLabels||[]).includes(e.colorId)):[];
        const manualLinked=dayEvents.filter(e=>e.habitId===h.id||(e.tasks||[]).some(tt=>tt.habitId===h.id));
        const allLinked=[...linkedEvs,...manualLinked.filter(e=>!linkedEvs.find(le=>le.id===e.id))];
        const freq=h.frequency==="daily"?"Every day":h.frequency?.interval?`Every ${h.frequency.interval} week${h.frequency.interval>1?"s":""} on ${(h.frequency.days||[]).map(d=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d]).join(", ")}`:(h.frequency?.days||[]).map(d=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d]).join(", ");

        return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setSelectedHabit(null)}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,background:t.bg2,borderTopLeftRadius:22,borderTopRightRadius:22,padding:"20px 20px 30px",maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.08)",margin:"0 auto 16px"}}/>

            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <div onClick={()=>{setHabits(p=>p.map(hb=>hb.id===h.id?{...hb,log:{...hb.log,[selD]:done?undefined:{done:true,manual:true}}}:hb));setSelectedHabit(null);setTimeout(()=>setSelectedHabit(h.id),50);}} style={{width:28,height:28,borderRadius:8,flexShrink:0,cursor:"pointer",
                border:done?"2px solid #34d399":"2px solid rgba(255,255,255,0.1)",background:done?"#34d399":"transparent",
                display:"flex",alignItems:"center",justifyContent:"center"
              }}>{done&&<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {h.emoji&&<span style={{fontSize:22}}>{h.emoji}</span>}
                  <span style={{fontSize:17,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif"}}>{h.title}</span>
                </div>
                {h.description&&<div style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",marginTop:3}}>{h.description}</div>}
              </div>
            </div>

            {/* Stats */}
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[["🔥",streak+"d","Streak"],["🏆",best+"d","Best"],["✅",totalDone+"","Total"],["📅",freq.length>15?freq.slice(0,12)+"...":freq,"Frequency"]].map(([icon,val,label],i)=>(
                <div key={i} style={{flex:1,padding:"10px 8px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",textAlign:"center"}}>
                  <div style={{fontSize:14,marginBottom:2}}>{icon}</div>
                  <div style={{fontSize:12,fontWeight:700,color:t.tx,fontFamily:"'Azeret Mono',monospace"}}>{val}</div>
                  <div style={{fontSize:7,color:"rgba(255,255,255,0.15)",fontFamily:"'Outfit',sans-serif",marginTop:1}}>{label}</div>
                </div>
              ))}
            </div>

            {/* Conditions */}
            {h.type==="linked"&&(
              <div style={{marginBottom:16,padding:"12px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
                {(()=>{
                  const labelItems=linkedEvs.map(e=>({id:e.id,type:"event",emoji:e.emoji,title:e.title,done:e.tasks?.length>0?e.tasks.every(tt=>tt.done):!!e.done,colorId:e.colorId}));
                  const manualItems=[];
                  manualLinked.filter(e=>e.habitId===h.id&&!linkedEvs.find(le=>le.id===e.id)).forEach(e=>{
                    manualItems.push({id:e.id,type:"event",emoji:e.emoji,title:e.title,done:e.tasks?.length>0?e.tasks.every(tt=>tt.done):!!e.done});
                  });
                  manualLinked.filter(e=>(e.tasks||[]).some(tt=>tt.habitId===h.id)).forEach(e=>{
                    (e.tasks||[]).filter(tt=>tt.habitId===h.id).forEach(sub=>{
                      manualItems.push({id:sub.id,type:"subtask",emoji:null,title:sub.text,done:sub.done,parent:e.title,parentEmoji:e.emoji});
                    });
                  });
                  const allItems=[...labelItems,...manualItems];
                  const doneCount=allItems.filter(it=>it.done).length;

                  const renderItem=(it,showUnlink)=>(
                    <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:7,background:it.done?"rgba(52,211,153,0.03)":"rgba(255,255,255,0.01)"}}>
                      <div style={{width:12,height:12,borderRadius:4,border:it.done?"1.5px solid #34d399":"1.5px solid rgba(255,255,255,0.1)",background:it.done?"#34d399":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {it.done&&<svg width="7" height="7" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="#fff" strokeWidth="3" strokeLinecap="round"/></svg>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontSize:11,color:it.done?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.4)",fontFamily:"'Outfit',sans-serif",textDecoration:it.done?"line-through":"none"}}>
                          {it.emoji?it.emoji+" ":""}{it.title}
                        </span>
                        {it.parent&&<span style={{fontSize:8,color:"rgba(255,255,255,0.08)",fontFamily:"'Outfit',sans-serif",marginLeft:4}}>({it.parentEmoji?it.parentEmoji+" ":""}{it.parent})</span>}
                      </div>
                      {showUnlink&&<button onClick={(e)=>{e.stopPropagation();
                        if(it.type==="subtask") setAllEvents(p=>p.map(ev=>({...ev,tasks:(ev.tasks||[]).map(tt=>tt.id===it.id?{...tt,habitId:undefined}:tt)})));
                        else setAllEvents(p=>p.map(ev=>ev.id===it.id?{...ev,habitId:undefined}:ev));
                        setSelectedHabit(null);setTimeout(()=>setSelectedHabit(h.id),50);
                      }} style={{background:"none",border:"none",cursor:"pointer",color:"#e57373",fontSize:7,fontFamily:"'Outfit',sans-serif",padding:"2px 4px",flexShrink:0}}>Unlink</button>}
                    </div>
                  );

                  return <>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",fontWeight:600,letterSpacing:0.5}}>CONDITIONS</div>
                      {allItems.length>0&&<span style={{fontSize:9,color:doneCount===allItems.length&&allItems.length>0?"#34d399":"rgba(255,255,255,0.15)",fontFamily:"'Azeret Mono',monospace",fontWeight:600}}>{doneCount}/{allItems.length}</span>}
                    </div>

                    {/* Label-linked */}
                    {lbls.map(lb=>{
                      const lbItems=labelItems.filter(it=>it.colorId===lb.id);
                      return <div key={lb.id} style={{marginBottom:manualItems.length>0||lbls.indexOf(lb)<lbls.length-1?10:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                          <div style={{width:8,height:8,borderRadius:"50%",background:lb.hex}}/>
                          <span style={{fontSize:8,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",fontWeight:600}}>{lb.label}</span>
                          <span style={{fontSize:8,color:"rgba(255,255,255,0.1)",fontFamily:"'Azeret Mono',monospace"}}>{lbItems.filter(i=>i.done).length}/{lbItems.length}</span>
                        </div>
                        {lbItems.length>0?<div style={{display:"flex",flexDirection:"column",gap:3}}>
                          {lbItems.map(it=>renderItem(it,false))}
                        </div>:<div style={{fontSize:9,color:"rgba(255,255,255,0.08)",fontFamily:"'Outfit',sans-serif",padding:"2px 0 2px 13px"}}>No {lb.label} events on this day</div>}
                      </div>;
                    })}

                    {/* Manually linked */}
                    {manualItems.length>0&&<div>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                        <svg width="8" height="8" viewBox="0 0 16 16" fill="none"><path d="M6 3L3 6l3 3M10 3l3 3-3 3" stroke={t.accent} strokeWidth="1.5" strokeLinecap="round"/></svg>
                        <span style={{fontSize:8,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",fontWeight:600}}>Manually linked</span>
                        <span style={{fontSize:8,color:"rgba(255,255,255,0.1)",fontFamily:"'Azeret Mono',monospace"}}>{manualItems.filter(i=>i.done).length}/{manualItems.length}</span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        {manualItems.map(it=>renderItem(it,true))}
                      </div>
                    </div>}

                    {lbls.length===0&&manualItems.length===0&&<div style={{fontSize:10,color:"rgba(255,255,255,0.1)",fontFamily:"'Outfit',sans-serif",padding:"8px 0"}}>No linked items on this day</div>}
                  </>;
                })()}
              </div>
            )}

            {/* Actions */}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setSelectedHabit(null);setEditingHabit({...h});}} style={{flex:1,padding:12,borderRadius:12,border:"none",cursor:"pointer",background:`rgba(${aR},0.08)`,border:`1px solid rgba(${aR},0.15)`,color:t.accent,fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M11.5 1.5L14.5 4.5M1 15L1.5 11.5L12 1L15 4L4.5 14.5L1 15Z" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Edit Habit
              </button>
              <button onClick={()=>setSelectedHabit(null)} style={{flex:1,padding:12,borderRadius:12,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.3)",fontSize:12,fontFamily:"'Outfit',sans-serif"}}>Close</button>
            </div>
          </div>
        </div>;
      })()}

      {/* Move Note Modal */}
      {movingNote && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setMovingNote(null)}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,background:t.bg2,borderTopLeftRadius:20,borderTopRightRadius:20,padding:"20px 20px 30px",maxHeight:"60vh",overflowY:"auto"}}>
            <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.08)",margin:"0 auto 16px"}}/>
            <div style={{fontSize:14,fontWeight:700,color:t.tx,fontFamily:"'Outfit',sans-serif",marginBottom:4}}>Move "{movingNote.title||"Untitled"}"</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontFamily:"'Outfit',sans-serif",marginBottom:16}}>{movingNote._type==="journal"?"Select a new date":"Select a folder"}</div>

            {movingNote._type==="journal" ? (
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <input type="date" defaultValue={movingNote.date} onChange={e=>{
                  if(e.target.value){
                    setJournalEntries(p=>p.map(x=>x.id===movingNote.id?{...x,date:e.target.value,modifiedAt:new Date().toISOString()}:x));
                    setMovingNote(null);
                  }
                }} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px",color:t.tx,fontSize:14,fontFamily:"'Outfit',sans-serif",outline:"none"}}/>
                <button onClick={()=>{
                  setJournalEntries(p=>p.map(x=>x.id===movingNote.id?{...x,date:todayKey,modifiedAt:new Date().toISOString()}:x));
                  setMovingNote(null);
                }} style={{padding:"12px",borderRadius:10,border:"none",cursor:"pointer",background:`rgba(${aR},0.08)`,color:t.accent,fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>Move to Today</button>
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {(()=>{
                  const renderLevel=(parentId,depth)=>{
                    return vaultFolders.filter(f=>(f.parentId||null)===parentId).map(f=>(
                      <React.Fragment key={f.id}>
                        <button onClick={()=>{setVaultNotes(p=>p.map(x=>x.id===movingNote.id?{...x,folderId:f.id}:x));setMovingNote(null);}} style={{
                          display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 12px",paddingLeft:12+depth*20,borderRadius:8,border:"none",cursor:"pointer",textAlign:"left",
                          background:movingNote.folderId===f.id?`rgba(${aR},0.1)`:"transparent",
                          color:movingNote.folderId===f.id?t.accent:"rgba(255,255,255,0.5)",fontSize:12,fontFamily:"'Outfit',sans-serif",fontWeight:500
                        }}><span style={{fontSize:16}}>{f.emoji||"📁"}</span> {f.name}</button>
                        {renderLevel(f.id,depth+1)}
                      </React.Fragment>
                    ));
                  };
                  return <>
                    <button onClick={()=>{setVaultNotes(p=>p.map(x=>x.id===movingNote.id?{...x,folderId:null}:x));setMovingNote(null);}} style={{
                      display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 12px",borderRadius:8,border:"none",cursor:"pointer",textAlign:"left",
                      background:!movingNote.folderId?`rgba(${aR},0.1)`:"transparent",
                      color:!movingNote.folderId?t.accent:"rgba(255,255,255,0.5)",fontSize:12,fontFamily:"'Outfit',sans-serif",fontWeight:500
                    }}><span style={{fontSize:16}}>🏠</span> Home</button>
                    {renderLevel(null,0)}
                  </>;
                })()}
              </div>
            )}

            <button onClick={()=>setMovingNote(null)} style={{width:"100%",marginTop:14,padding:"12px",borderRadius:10,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.3)",fontSize:12,fontFamily:"'Outfit',sans-serif"}}>Cancel</button>
          </div>
        </div>
      )}

      {/* Confirmation Modal */}
      {confirmAction && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:40}} onClick={()=>setConfirmAction(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:t.bg2,borderRadius:16,padding:"24px 22px",width:"100%",maxWidth:320,border:`1px solid rgba(${aR},0.15)`}}>
            <p style={{fontSize:14,fontWeight:600,color:t.tx,marginBottom:18,lineHeight:1.6,fontFamily:"'Outfit',sans-serif"}}>{confirmAction.msg}</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmAction(null)} style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.4)",fontSize:13,fontWeight:500,fontFamily:"'Outfit',sans-serif"}}>Cancel</button>
              <button onClick={()=>{confirmAction.onConfirm();setConfirmAction(null);}} style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:"pointer",background:"rgba(213,0,0,0.12)",border:"1px solid rgba(213,0,0,0.2)",color:"#e57373",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ForgeApp));
  </script>
