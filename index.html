// ── DATE/TIME UTILS ──
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const FULL_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const toDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const isToday = (d) => toDateStr(d) === toDateStr(new Date());
const parseDateStr = (s) => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };

const fmtTime = (m) => {
  const clamped = ((m % 1440) + 1440) % 1440;
  const h = Math.floor(clamped / 60), mn = clamped % 60;
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}:${String(mn).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
};

const fmtDateShort = (dateStr) => {
  const d = parseDateStr(dateStr);
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
};

const to24 = (h, ap) => { if (ap === "AM") return h === 12 ? 0 : h; return h === 12 ? 12 : h + 12; };
const to12 = (h24) => ({ h: h24 === 0 ? 12 : h24 > 12 ? h24 - 12 : h24, ap: h24 >= 12 ? "PM" : "AM" });


// ── Get events visible on a specific date (including multi-day overflow) ──
const getEventsForDate = (allEvents, dateStr) => {
  const results = [];
  for (const ev of allEvents) {
    if (ev.startDate === dateStr && ev.endDate === dateStr) {
      results.push({ ...ev, dispStart: ev.startMin, dispEnd: ev.endMin, isOverflow: false });
    } else if (ev.startDate === dateStr && ev.endDate !== dateStr) {
      // Starts today, ends another day: show from startMin to end of day
      results.push({ ...ev, dispStart: ev.startMin, dispEnd: 1440, isOverflow: "start" });
    } else if (ev.startDate !== dateStr && ev.endDate === dateStr) {
      // Started earlier, ends today: show from start of day to endMin
      results.push({ ...ev, dispStart: 0, dispEnd: ev.endMin, isOverflow: "end" });
    } else {
      // Check if date falls between start and end
      const start = parseDateStr(ev.startDate);
      const end = parseDateStr(ev.endDate);
      const cur = parseDateStr(dateStr);
      if (cur > start && cur < end) {
        results.push({ ...ev, dispStart: 0, dispEnd: 1440, isOverflow: "mid" });
      }
    }
  }
  return results.sort((a, b) => a.dispStart - b.dispStart);
};

  const events = getEventsForDate(allEvents, dateKey);

  const updateEvent = (id, updater) => {
    setAllEvents(p => p.map(e => e.id === id ? (typeof updater === "function" ? updater(e) : { ...e, ...updater }) : e));
  };

  const toggle = (eid, tid) => {
    updateEvent(eid, e => ({
      ...e, tasks: e.tasks.map(t => t.id === tid ? { ...t, done: !t.done } : t)
    }));
    if (detailEvent && detailEvent.id === eid) {
      setDetailEvent(prev => ({ ...prev, tasks: prev.tasks.map(t => t.id === tid ? { ...t, done: !t.done } : t) }));
    }
  };

  const toggleAllTasks = (eid) => {
    updateEvent(eid, e => {
      if (e.tasks.length === 0) return { ...e, done: !e.done };
      const allDone = e.tasks.every(t => t.done);
      return { ...e, done: !allDone, tasks: e.tasks.map(t => ({ ...t, done: !allDone })) };

  };

  const nudgeTime = (eid, mins) => {
    setAllEvents(p => {
      const idx = p.findIndex(e => e.id === eid);
      if (idx === -1) return p;
      const ev = p[idx];
      const dur = ev.endMin - ev.startMin;
      const newStart = Math.max(0, Math.min(1410, ev.startMin + mins));
      const newEnd = ev.startDate === ev.endDate ? newStart + dur : ev.endMin;
      const delta = newStart - ev.startMin;
      if (delta === 0) return p;
      if (cascadeNudge) {
        const dayEvents = p.filter(e => e.startDate === ev.startDate).sort((a, b) => a.startMin - b.startMin);

        return p.map(e => {
          if (e.id === eid) return { ...e, startMin: newStart, endMin: ev.startDate === ev.endDate ? newEnd : e.endMin };
          if (toShift.has(e.id)) return { ...e, startMin: Math.max(0, Math.min(1410, e.startMin + delta)), endMin: e.startDate === e.endDate ? Math.max(0, Math.min(1440, e.endMin + delta)) : e.endMin };
          return e;
        });
      }
      return p.map(e => e.id === eid ? { ...e, startMin: newStart, endMin: ev.startDate === ev.endDate ? newEnd : e.endMin } : e);
    });
  };

  const evStatus = (ev) => {
    if (!viewingToday) return "upcoming";
    if (nowMins < ev.dispStart) return "upcoming";
    if (nowMins <= ev.dispEnd) return "active";
    return "past";
  };

  const openDetail = (ev) => {
    const fresh = allEvents.find(e => e.id === ev.id) || ev;
    setDetailEvent(fresh);
    setEditMode(false);
  };

  const openEdit = (isNew = false) => {
    const ev = isNew ? null : detailEvent;
    const now = new Date();
    const nowH = now.getHours();
    const nowM = Math.ceil(now.getMinutes() / 5) * 5;
    const s12 = ev ? to12(Math.floor(ev.startMin / 60)) : to12(nowH);
    let dur = 30;
    if (ev) {
      if (ev.startDate === ev.endDate) { dur = ev.endMin - ev.startMin; }
      else {
        const dayDiff = Math.round((parseDateStr(ev.endDate) - parseDateStr(ev.startDate)) / 86400000);
        dur = (1440 - ev.startMin) + ev.endMin + (dayDiff - 1) * 1440;
      }
      dur = Math.max(5, dur);
    } else { dur = 60; }
    setEditForm({
      emoji: ev ? (ev.emoji || "") : "",
      title: ev ? ev.title : "",
      description: ev ? ev.description : "",
      startDate: ev ? ev.startDate : dateKey,
      startH: s12.h, startM: ev ? ev.startMin % 60 : nowM, startAP: s12.ap,
      dur,
      endDate: ev ? ev.endDate : dateKey,
      endH: ev ? to12(Math.floor(ev.endMin/60)).h : to12(Math.min(23,nowH+1)).h,
      endM: ev ? ev.endMin % 60 : nowM,
      endAP: ev ? to12(Math.floor(ev.endMin/60)).ap : to12(Math.min(23,nowH+1)).ap,
      durTab: "duration",
      colorId: ev ? ev.colorId : "lavender"
    });
    setEditMode(true);
    setCreating(isNew);
  };

  const saveEdit = () => {
    const startMin = to24(editForm.startH, editForm.startAP) * 60 + editForm.startM;
    const endDate = editForm.endDate;
    const endMin = to24(editForm.endH, editForm.endAP) * 60 + editForm.endM;

    if (creating) {
      const newEv = {
        id: `ev-${Date.now()}`, emoji: editForm.emoji || "", title: editForm.title || "New Event",
        startDate: editForm.startDate, startMin,
        endDate, endMin,
        colorId: editForm.colorId, description: editForm.description,
        tasks: [], done: false
      };
      setAllEvents(p => [...p, newEv]);
      setDetailEvent(newEv);
    } else if (detailEvent) {
      const updated = {
        ...detailEvent, emoji: editForm.emoji || "", title: editForm.title, description: editForm.description,
        startDate: editForm.startDate, startMin,
        endDate, endMin,
        colorId: editForm.colorId
      };
      setAllEvents(p => p.map(e => e.id === updated.id ? updated : e));
      setDetailEvent(updated);
    }
    setEditMode(false);
    setCreating(false);
  };

  const deleteEvent = () => {
    if (!detailEvent) return;
    setAllEvents(p => p.filter(e => e.id !== detailEvent.id));
    setDetailEvent(null);
    setEditMode(false);
  };

  const closeDetail = () => { setDetailEvent(null); setEditMode(false); setCreating(false); };

  const doneCount = events.filter(e => {
    const real = allEvents.find(a => a.id === e.id);
    if (!real) return false;
    return real.tasks.length > 0 ? real.tasks.every(t => t.done) : !!real.done;
  }).length;
  const totalCount = events.length;
  const pct = totalCount > 0 ? (doneCount / totalCount) * 100 : 0;

  const getDateStrip = () => { const d = []; for (let i=-3;i<=3;i++) d.push(addDays(selectedDate, i)); return d; };
  const shiftDate = (days) => { setSelectedDate(addDays(selectedDate, days)); setNudgeId(null); };

  const onTouchStart = useCallback((e) => {
    if (e.touches.length === 2) { const dx = e.touches[0].clientX-e.touches[1].clientX; const dy = e.touches[0].clientY-e.touches[1].clientY; pinchRef.current = { dist: Math.hypot(dx,dy), zoom: zoomLevel }; }
  }, [zoomLevel]);
  const onTouchMove = useCallback((e) => {
    if (e.touches.length === 2) { const dx = e.touches[0].clientX-e.touches[1].clientX; const dy = e.touches[0].clientY-e.touches[1].clientY; setZoomLevel(Math.min(4, Math.max(0.4, pinchRef.current.zoom*(Math.hypot(dx,dy)/pinchRef.current.dist)))); }
  }, []);
  const handleSwipeStart = (e) => { if (e.touches.length===1) touchStartX.current = e.touches[0].clientX; };
  const handleSwipeEnd = (e) => { if (view==="timeline") return; const dx = e.changedTouches[0].clientX-touchStartX.current; if (Math.abs(dx)>70) shiftDate(dx<0?1:-1); };

  // ── Shared: Checkbox ──
  const Chk = ({ checked, color, sz=15, round=false, onClick }) => (
    <div onClick={onClick} style={{
      width:sz, height:sz, borderRadius: round?"50%":4,
      border:`1.5px solid ${checked?color:"rgba(255,255,255,0.15)"}`,
      background: checked?color:"transparent",
      display:"flex", alignItems:"center", justifyContent:"center",
      flexShrink:0, cursor:"pointer", transition:"all 0.15s"
    }}>
      {checked && <svg width={sz*0.6} height={sz*0.6} viewBox="0 0 10 10" fill="none">
        <path d="M2 5L4.5 7.5L8 3" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>}
    </div>
  );

  // ── CHECKLIST VIEW ──
  const ChecklistView = () => (
    <div style={{ display:"flex", flexDirection:"column", gap:1 }}>
      {events.map(ev => {
        const real = allEvents.find(a => a.id === ev.id) || ev;
        const s = evStatus(ev);
        const c = getLabel(real.colorId);
        const allDone = real.tasks.length > 0 ? real.tasks.every(t=>t.done) : !!real.done;
        const isActive = s === "active";
        const hasTasks = real.tasks.length > 0;
        const tasksDone = real.tasks.filter(t=>t.done).length;
        const dur = ev.dispEnd - ev.dispStart;
        const crossesMidnight = ev.isOverflow;

        return (
          <div key={ev.id} style={{
            padding:"11px 14px", borderRadius:10,
            background: isActive ? c.bg : "transparent",
            opacity: s==="past"?0.4:1,
            borderLeft:`3px solid ${isActive?c.hex:c.hex+"40"}`,
            transition:"all 0.2s"
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div onClick={(e)=>{e.stopPropagation(); setNudgeId(nudgeId===ev.id?null:ev.id);}}
                style={{
                  fontFamily:"'Azeret Mono',monospace", minWidth:54,
                  display:"flex", flexDirection:"column", alignItems:"center",
                  cursor:"pointer", padding:"4px 2px", borderRadius:6,
                  background: nudgeId===ev.id?`rgba(${aR},0.1)`:"transparent",
                  border: nudgeId===ev.id?"1px solid rgba(${aR},0.2)":"1px solid transparent",
                  transition:"all 0.15s"
                }}>
                <span style={{ fontSize:9.5, color: nudgeId===ev.id?t.accentL:"rgba(255,255,255,0.22)" }}>{fmtTime(ev.dispStart)}</span>
                {dur > 0 && <span style={{ fontSize:8, color: nudgeId===ev.id?"rgba(196,181,253,0.4)":"rgba(255,255,255,0.13)", marginTop:1 }}>
                  ({dur >= 60 ? `${Math.floor(dur/60)}h${dur%60>0?` ${dur%60}m`:""}` : `${dur}m`})
                </span>}
                {crossesMidnight && <span style={{ fontSize:7, color:t.accent, marginTop:1, opacity:0.5 }}>
                  {crossesMidnight === "start" ? "cont. \u2192" : "\u2190 cont."}
                </span>}
              </div>

              <div onClick={(e)=>{e.stopPropagation(); toggleAllTasks(ev.id);}}>
                <Chk checked={allDone} color={c.hex} sz={16} round />
              </div>

              <div onClick={()=>openDetail(ev)} style={{ flex:1, cursor:"pointer" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{
                    fontSize:13, fontWeight:600, letterSpacing:"-0.2px",
                    color: allDone?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.7)",
                    textDecoration: allDone?"line-through":"none"
                  }}>{evTitle(real)}</span>
                  {isActive && <div style={{ width:5,height:5,borderRadius:"50%", background:c.hex, boxShadow:`0 0 8px ${c.hex}80`, animation:"pulse 2s infinite" }}/>}
                </div>
                <div style={{ fontSize:11, color:"rgba(255,255,255,0.22)", marginTop:3, lineHeight:1.5 }}>{real.description}</div>
              </div>

              {hasTasks && <span style={{ fontFamily:"'Azeret Mono',monospace", fontSize:9, color:c.hex, opacity:0.6, background:c.bg, padding:"2px 7px", borderRadius:6 }}>{tasksDone}/{real.tasks.length}</span>}
            </div>

            {hasTasks && (
              <div style={{ marginLeft:80, marginTop:6, display:"flex", flexDirection:"column", gap:4 }}>
                {real.tasks.map(t => (
                  <div key={t.id} onClick={(e)=>{e.stopPropagation(); toggle(ev.id, t.id);}}
                    style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", padding:"2px 0" }}>
                    <Chk checked={t.done} color={c.hex} sz={13}/>
                    <span style={{ fontSize:11.5, color:t.done?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.5)", textDecoration:t.done?"line-through":"none" }}>{t.text}</span>
                  </div>
                ))}
              </div>
            )}

            {nudgeId === ev.id && (
              <div style={{ marginTop:8, padding:"8px 10px", borderRadius:10, background:`rgba(${aR},0.06)`, border:"1px solid rgba(${aR},0.1)", display:"flex", flexDirection:"column", gap:8 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                  {[-30,-15,-5].map(m => (
                    <button key={m} onClick={(e)=>{e.stopPropagation(); nudgeTime(ev.id, m);}}
                      style={{ padding:"6px 10px", borderRadius:8, border:"none", cursor:"pointer", background:"rgba(255,255,255,0.04)", color:"#e57373", fontSize:11, fontWeight:600, fontFamily:"'Azeret Mono',monospace", minWidth:40 }}>{m}m</button>
                  ))}
                  <div style={{ width:1, height:18, background:"rgba(255,255,255,0.06)", margin:"0 4px" }}/>
                  {[5,15,30].map(m => (
                    <button key={m} onClick={(e)=>{e.stopPropagation(); nudgeTime(ev.id, m);}}
                      style={{ padding:"6px 10px", borderRadius:8, border:"none", cursor:"pointer", background:"rgba(255,255,255,0.04)", color:"#81c784", fontSize:11, fontWeight:600, fontFamily:"'Azeret Mono',monospace", minWidth:40 }}>+{m}m</button>
                  ))}
                </div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                  <div onClick={(e)=>{e.stopPropagation(); setCascadeNudge(!cascadeNudge);}} style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer" }}>
                    <Chk checked={cascadeNudge} color={t.accent} sz={13}/>
                    <span style={{ fontSize:10, color:"rgba(255,255,255,0.3)", fontFamily:"'Azeret Mono',monospace" }}>cascade all below</span>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );

  // ── TIMELINE VIEW ──
  const TimelineView = () => {
    const hStart=0, hEnd=23; const ppm=zoomLevel;
    const totalPx=(hEnd-hStart+1)*60*ppm;
    const sorted=[...events].filter(e=>e.dispEnd>hStart*60&&e.dispStart<(hEnd+1)*60).sort((a,b)=>a.dispStart-b.dispStart||(b.dispEnd-b.dispStart)-(a.dispEnd-a.dispStart));
    const placed=[];
    sorted.forEach(ev=>{let col=0;while(true){const c=placed.find(p=>p._col===col&&ev.dispStart<p.dispEnd&&ev.dispEnd>p.dispStart);if(!c)break;col++;}ev._col=col;placed.push(ev);});
    const getGroupMax=(ev)=>{const o=placed.filter(p=>ev.dispStart<p.dispEnd&&ev.dispEnd>p.dispStart);return Math.max(...o.map(p=>p._col))+1;};

    const handleTimelineClick = (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const rawMins = y / ppm + hStart * 60;
      const snapped = Math.floor(rawMins / 15) * 15;
      if (snapped < 0 || snapped > 1425) return;
      if (e.target !== e.currentTarget && !e.target.dataset.timeline) return;
      setQuickCreate({ mins: snapped, clientY: e.clientY });
    };

    const selectDuration = (durMins) => {
      const startMins = quickCreate.mins;
      const s12 = to12(Math.floor(startMins / 60));
      const totalEnd = startMins + durMins;
      const eDate = totalEnd >= 1440 ? toDateStr(addDays(selectedDate, Math.floor(totalEnd/1440))) : dateKey;
      const eMins = totalEnd % 1440;
      const e12 = to12(Math.floor(eMins / 60));
      setEditForm({
        emoji: "", title: "", description: "",
        startDate: dateKey, startH: s12.h, startM: startMins % 60, startAP: s12.ap,
        dur: durMins,
        endDate: eDate, endH: e12.h, endM: eMins % 60, endAP: e12.ap,
        durTab: "duration",
        colorId: "lavender"
      });
      setQuickCreate(null);
      setDetailEvent(null);
      setCreating(true);
      setEditMode(true);
    };

    const fmtDur = (m) => m >= 60 ? `${Math.floor(m/60)}h${m%60>0?m%60:""}` : `${m}m`;

    return (
      <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} style={{ position:"relative", marginLeft:50, minHeight:totalPx, touchAction:"pan-y", paddingTop:36 }}>
        <div style={{ position:"sticky", top:0, zIndex:20, display:"flex", justifyContent:"flex-end", padding:"0 0 8px", marginTop:-36, pointerEvents:"none" }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, background:t.bg, borderRadius:8, padding:"4px 8px", border:`1px solid ${t.accent}20`, pointerEvents:"auto" }}>
            <button onClick={()=>setZoomLevel(z=>Math.max(0.4,z-0.3))} style={{ background:"none", border:"none", color:t.accent, fontSize:18, cursor:"pointer", padding:"0 6px" }}>&minus;</button>
            <span style={{ fontFamily:"'Azeret Mono',monospace", fontSize:8, color:"rgba(255,255,255,0.25)", minWidth:20, textAlign:"center" }}>{zoomLevel.toFixed(1)}x</span>
            <button onClick={()=>setZoomLevel(z=>Math.min(4,z+0.3))} style={{ background:"none", border:"none", color:t.accent, fontSize:18, cursor:"pointer", padding:"0 6px" }}>+</button>
          </div>
        </div>

        {/* Hour lines + clickable background */}
        <div data-timeline="true" onClick={handleTimelineClick} style={{position:"absolute",inset:0,top:0,cursor:"crosshair"}}>
          {Array.from({length:hEnd-hStart+1},(_,i)=>{const h=hStart+i;const lbl=h<12?`${h===0?12:h} AM`:h===12?"12 PM":`${h-12} PM`;return(
            <div key={h} data-timeline="true" style={{position:"absolute",top:(h-hStart)*60*ppm,left:0,right:0}}>
              <span style={{position:"absolute",left:-50,top:-6,fontFamily:"'Azeret Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.13)",width:42,textAlign:"right",pointerEvents:"none"}}>{lbl}</span>
              <div data-timeline="true" style={{borderTop:"1px solid rgba(255,255,255,0.035)"}}/>
            </div>);
          })}
        </div>

        {/* Events */}
        {sorted.map(ev=>{
          const real=allEvents.find(a=>a.id===ev.id)||ev;
          const c=getLabel(real.colorId);
          const s=evStatus(ev);
          const top=(ev.dispStart-hStart*60)*ppm;
          const durMins=ev.dispEnd-ev.dispStart;
          const h=Math.max(durMins*ppm,22);
          const gm=getGroupMax(ev);
          const w=100/gm;
          const left=ev._col*w;
          const isSmall = h < 30;
          const isMedium = h >= 30 && h < 55;

          return(
            <div key={ev.id} onClick={(e)=>{e.stopPropagation();openDetail(ev);}} style={{
              position:"absolute",top,left:`calc(${left}% + 3px)`,width:`calc(${w}% - 5px)`,
              height:h,background:c.bg,borderLeft:`3px solid ${c.hex}`,
              borderRadius:7,padding:isSmall?"2px 8px":"4px 8px",overflow:"hidden",opacity:s==="past"?0.3:1,
              cursor:"pointer",border:`1px solid ${c.hex}20`,zIndex:5
            }}>
              {/* Small events: single line with title + duration */}
              {isSmall && (
                <div style={{display:"flex",alignItems:"center",gap:4,height:"100%"}}>
                  <span style={{fontWeight:600,fontSize:9,color:"rgba(255,255,255,0.75)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{evTitle(real)}</span>
                  <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:7,color:c.hex,opacity:0.6,flexShrink:0}}>({fmtDur(durMins)})</span>
                </div>
              )}

              {/* Medium events: title+dur on top, times below */}
              {isMedium && (<>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontWeight:600,fontSize:10,color:"rgba(255,255,255,0.75)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{evTitle(real)}</span>
                  <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:8,color:c.hex,opacity:0.5,flexShrink:0}}>({fmtDur(durMins)})</span>
                </div>
                <div style={{fontSize:8,color:"rgba(255,255,255,0.25)",marginTop:1,fontFamily:"'Azeret Mono',monospace"}}>{fmtTime(ev.dispStart)} – {fmtTime(ev.dispEnd)}</div>
              </>)}

              {/* Large events: full detail */}
              {!isSmall && !isMedium && (<>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontWeight:600,fontSize:10.5,color:"rgba(255,255,255,0.75)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{evTitle(real)}</span>
                  <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:8,color:c.hex,opacity:0.6,background:`${c.hex}15`,padding:"1px 5px",borderRadius:4,flexShrink:0}}>{fmtDur(durMins)}</span>
                </div>
                <div style={{fontSize:8.5,color:"rgba(255,255,255,0.3)",marginTop:2,fontFamily:"'Azeret Mono',monospace"}}>{fmtTime(ev.dispStart)} – {fmtTime(ev.dispEnd)}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginTop:3,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{real.description}</div>
              </>)}
            </div>
          );
        })}

        {/* Now line */}
        {viewingToday&&nowMins>=hStart*60&&nowMins<=(hEnd+1)*60&&(
          <div style={{position:"absolute",top:(nowMins-hStart*60)*ppm,left:-8,right:0,height:2,zIndex:10,background:t.accent,boxShadow:`0 0 14px ${t.accent}80`}}>
            <div style={{position:"absolute",left:-3,top:-3,width:8,height:8,borderRadius:"50%",background:t.accent}}/>
          </div>
        )}

        {/* Quick create duration picker */}
        {quickCreate && (
          <div style={{position:"fixed",inset:0,zIndex:100}} onClick={()=>setQuickCreate(null)}>
            <div onClick={e=>e.stopPropagation()} style={{
              position:"absolute",
              top: Math.min(quickCreate.clientY, window.innerHeight - 260),
              left:"50%",transform:"translateX(-50%)",
              background:t.bg3,borderRadius:16,padding:"14px 16px",
              border:"1px solid rgba(${aR},0.2)",
              boxShadow:"0 8px 32px rgba(0,0,0,0.6)",
              width:"88%",maxWidth:340,zIndex:101
            }}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:t.accent}}/>
                <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:11,color:t.accentL}}>{fmtTime(quickCreate.mins)}</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.15)"}}>to</span>
                <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:11,color:t.accentL}}>{fmtTime(quickCreate.mins + (quickCreate.dur || 30))}</span>
              </div>

              {/* Presets */}
              <div style={{display:"flex",gap:5,marginBottom:12}}>
                {[15,30,45,60,120].map(d=>(
                  <button key={d} onClick={()=>setQuickCreate(p=>({...p,dur:d}))} style={{
                    flex:1,padding:"7px 0",borderRadius:7,border:"none",cursor:"pointer",
                    background: (quickCreate.dur||30)===d ? `rgba(${aR},0.2)` : `rgba(${aR},0.06)`,
                    color:t.accentL,fontSize:11,fontWeight:600,
                    fontFamily:"'Outfit',sans-serif",textAlign:"center",
                    border: (quickCreate.dur||30)===d ? "1px solid rgba(${aR},0.3)" : "1px solid rgba(${aR},0.08)"
                  }}>{d<60?`${d}m`:`${d/60}h`}</button>
                ))}
              </div>

              {/* Custom adjuster */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:10}}>
                <input
                  type="number" min={5} max={14400}
                  value={quickCreate.dur || 30}
                  onChange={e=>setQuickCreate(p=>({...p,dur:Math.max(5,Math.min(14400,+e.target.value||5))}))}
                  style={{
                    width:64,height:38,borderRadius:10,textAlign:"center",
                    background:`rgba(${aR},0.1)`,border:"1.5px solid rgba(${aR},0.25)",
                    color:"#f4f4f5",fontSize:18,fontWeight:700,
                    fontFamily:"'Azeret Mono',monospace",outline:"none"
                  }}/>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontFamily:"'Azeret Mono',monospace"}}>min</span>
                {(quickCreate.dur||30) >= 60 && <span style={{fontSize:10,color:`rgba(${aR},0.5)`,fontFamily:"'Azeret Mono',monospace"}}>
                  = {Math.floor((quickCreate.dur||30)/60)}h{(quickCreate.dur||30)%60>0?` ${(quickCreate.dur||30)%60}m`:""}
                </span>}
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:14}}>
                {[{v:-60,l:"-1h",c:"#e53935"},{v:-30,l:"-30",c:"#e57373"},{v:-15,l:"-15",c:"#ef9a9a"},{v:-5,l:"-5",c:"#ffab91"}].map(b=>(

                  <div key={col.id} onClick={()=>setEditForm(f=>({...f,colorId:col.id}))} style={{
                    display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:10,cursor:"pointer",
                    background:editForm.colorId===col.id?hexToBg(col.hex):"rgba(255,255,255,0.02)",
                    border:`1.5px solid ${editForm.colorId===col.id?col.hex+"60":"rgba(255,255,255,0.05)"}`
                  }}>
                    <div style={{width:12,height:12,borderRadius:"50%",background:col.hex}}/>
                    <span style={{fontSize:11,fontWeight:500,color:editForm.colorId===col.id?col.hex:"rgba(255,255,255,0.35)"}}>{col.label}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setEditMode(false);setCreating(false);}} style={{
                flex:1,padding:13,borderRadius:12,cursor:"pointer",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
                color:"rgba(255,255,255,0.5)",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif"
              }}>Cancel</button>
              {!creating && <button onClick={deleteEvent} style={{
                padding:"13px 16px",borderRadius:12,border:"none",cursor:"pointer",
                background:"rgba(213,0,0,0.1)",color:"#e57373",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif"
              }}>Delete</button>}
              {(()=>{
                const sMin=to24(editForm.startH,editForm.startAP)*60+editForm.startM;
                const eMin=to24(editForm.endH,editForm.endAP)*60+editForm.endM;
                const sDays=Math.round((parseDateStr(editForm.endDate)-parseDateStr(editForm.startDate))/86400000);
                const valid=(sDays*1440)+(eMin-sMin)>0;
                return <button onClick={valid?saveEdit:undefined} style={{
                  flex:2,padding:13,borderRadius:12,border:"none",
                  cursor:valid?"pointer":"not-allowed",
                  background:valid?`linear-gradient(135deg, ${ec.hex}, ${ec.hex}cc)`:"rgba(255,255,255,0.04)",
                  color:valid?"#fff":"rgba(255,255,255,0.15)",fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif",
                  boxShadow:valid?`0 4px 20px ${ec.hex}30`:"none",
                  opacity:valid?1:0.5
                }}>{creating ? "Create Event" : "Save Changes"}</button>;
              })()}
            </div>
          </div>
          {showDatePicker && <InlineDatePicker field={showDatePicker} />}
        </div>
      );
    }

    if (!ev) return null;
    const dur = ev.endDate === ev.startDate ? ev.endMin - ev.startMin : null;
    const durStr = dur !== null ? (dur >= 60 ? `${Math.floor(dur/60)}h${dur%60>0?` ${dur%60}m`:""}` : `${dur}m`) : "multi-day";
    const spansMultiple = ev.startDate !== ev.endDate;

    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={closeDetail}>
        <div onClick={e=>e.stopPropagation()} style={{background:t.bg2,borderRadius:"22px 22px 0 0",padding:"20px 22px 30px",width:"100%",maxWidth:480,maxHeight:"75vh",overflowY:"auto",borderTop:`3px solid ${c.hex}40`}}>
          <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.08)",margin:"0 auto 18px"}}/>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div style={{width:14,height:14,borderRadius:"50%",background:c.hex,flexShrink:0,boxShadow:`0 0 10px ${c.hex}40`}}/>
            <h2 style={{fontSize:19,fontWeight:700,color:"#f4f4f5",letterSpacing:"-0.5px",flex:1,lineHeight:1.3}}>{evTitle(ev)}</h2>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"10px 14px",borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)"}}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.25)" strokeWidth="1.2"/>
              <path d="M8 4V8L11 10" stroke="rgba(255,255,255,0.25)" strokeWidth="1.2" strokeLinecap="round"/>
            </svg>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Azeret Mono',monospace",fontSize:12,color:"rgba(255,255,255,0.5)"}}>
                {spansMultiple ? `${fmtDateShort(ev.startDate)} ${fmtTime(ev.startMin)}` : fmtTime(ev.startMin)}
                {" \u2013 "}
                {spansMultiple ? `${fmtDateShort(ev.endDate)} ${fmtTime(ev.endMin)}` : fmtTime(ev.endMin)}
              </div>
            </div>
            <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:10,color:c.hex,opacity:0.7,background:c.bg,padding:"2px 8px",borderRadius:6}}>{durStr}</span>
          </div>

          <p style={{fontSize:13.5,color:"rgba(255,255,255,0.45)",lineHeight:1.7,marginBottom:16}}>{ev.description}</p>

          {ev.tasks.length > 0 && (
            <div style={{marginBottom:18}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'Azeret Mono',monospace",letterSpacing:1.5,marginBottom:10}}>
                TASKS &middot; {ev.tasks.filter(t=>t.done).length}/{ev.tasks.length}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {ev.tasks.map(t=>(
                  <div key={t.id} onClick={()=>toggle(ev.id,t.id)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"8px 12px",borderRadius:8,background:t.done?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.04)"}}>
                    <Chk checked={t.done} color={c.hex} sz={16}/>
                    <span style={{fontSize:13,color:t.done?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.6)",textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:10}}>
            <button onClick={closeDetail} style={{flex:1,padding:13,borderRadius:12,cursor:"pointer",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.4)",fontSize:13,fontWeight:500,fontFamily:"'Outfit',sans-serif"}}>Close</button>
            <button onClick={()=>openEdit(false)} style={{
              flex:2,padding:13,borderRadius:12,border:"none",cursor:"pointer",background:c.hex,color:"#fff",
              fontSize:13,fontWeight:600,fontFamily:"'Outfit',sans-serif",boxShadow:`0 4px 16px ${c.hex}40`,
              display:"flex",alignItems:"center",justifyContent:"center",gap:7
            }}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M11.5 1.5L14.5 4.5M1 15L1.5 11.5L12 1L15 4L4.5 14.5L1 15Z" stroke="#fff" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Edit Event
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ── LABEL CRUD ──
  const saveLabel = () => {
    if (!labelForm.label.trim()) return;
    if (editingLabel) {
      setLabels(p => p.map(l => l.id === editingLabel ? { ...l, label: labelForm.label, hex: labelForm.hex } : l));
      setEditingLabel(null);
    } else {
      const newId = `label-${Date.now()}`;
      setLabels(p => [...p, { id: newId, label: labelForm.label, hex: labelForm.hex }]);
    }
    setLabelForm({ label: "", hex: "#a78bfa" });
  };

  const deleteLabel = (lid) => {
    if (labels.length <= 1) return;
    setLabels(p => p.filter(l => l.id !== lid));
    // Reassign orphaned events to first remaining label
    const fallback = labels.find(l => l.id !== lid)?.id || "lavender";
    setAllEvents(p => p.map(e => e.colorId === lid ? { ...e, colorId: fallback } : e));
  };

  const startEditLabel = (l) => {
    setEditingLabel(l.id);
    setLabelForm({ label: l.label, hex: l.hex });
  };

  // ── SETTINGS PANEL ──
  const SettingsPanel = () => (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:250,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>{setShowSettings(false);setEditingLabel(null);}}>
      <div onClick={e=>e.stopPropagation()} style={{background:t.bg2,borderRadius:"22px 22px 0 0",padding:"20px 22px 30px",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",borderTop:`3px solid ${t.accent}30`}}>
        <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.08)",margin:"0 auto 16px"}}/>
        <h2 style={{fontSize:18,fontWeight:700,color:"#f4f4f5",marginBottom:20,letterSpacing:"-0.5px",display:"flex",alignItems:"center",gap:8}}>
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke={t.accent} strokeWidth="1.5"/><path d="M17.4 12.2a1.4 1.4 0 00.28 1.54l.05.05a1.7 1.7 0 11-2.4 2.4l-.05-.05a1.4 1.4 0 00-1.54-.28 1.4 1.4 0 00-.85 1.28v.14a1.7 1.7 0 11-3.4 0v-.07A1.4 1.4 0 008.6 16a1.4 1.4 0 00-1.54.28l-.05.05a1.7 1.7 0 11-2.4-2.4l.05-.05a1.4 1.4 0 00.28-1.54 1.4 1.4 0 00-1.28-.85h-.14a1.7 1.7 0 110-3.4h.07A1.4 1.4 0 004 7.06a1.4 1.4 0 00-.28-1.54l-.05-.05a1.7 1.7 0 112.4-2.4l.05.05A1.4 1.4 0 007.66 3.4 1.4 1.4 0 008.5 2.55v-.14a1.7 1.7 0 113.4 0v.07a1.4 1.4 0 00.85 1.28 1.4 1.4 0 001.54-.28l.05-.05a1.7 1.7 0 112.4 2.4l-.05.05a1.4 1.4 0 00-.28 1.54 1.4 1.4 0 001.28.85h.14a1.7 1.7 0 010 3.4h-.07a1.4 1.4 0 00-1.28.85z" stroke={t.accent} strokeWidth="1.3"/></svg>
          Settings
        </h2>

        {/* ── LABELS SECTION ── */}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'Azeret Mono',monospace",letterSpacing:1.5,marginBottom:12}}>LABELS</div>

          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            {labels.map(l => (
              <div key={l.id} style={{
                display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:10,
                background: editingLabel === l.id ? `rgba(${aR},0.08)` : "rgba(255,255,255,0.02)",
                border: `1px solid ${editingLabel === l.id ? `rgba(${aR},0.2)` : "rgba(255,255,255,0.04)"}`,
                transition:"all 0.15s"
              }}>
                <div style={{width:18,height:18,borderRadius:"50%",background:l.hex,flexShrink:0,boxShadow:`0 0 8px ${l.hex}30`}}/>
                <span style={{flex:1,fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.7)"}}>{l.label}</span>
                <button onClick={()=>startEditLabel(l)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",borderRadius:6}}>
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M11.5 1.5L14.5 4.5M1 15L1.5 11.5L12 1L15 4L4.5 14.5L1 15Z" stroke="rgba(255,255,255,0.3)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
                <button onClick={()=>deleteLabel(l.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",borderRadius:6,opacity:labels.length<=1?0.2:1}}>
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.33 4V2.67a1.33 1.33 0 011.34-1.34h2.66a1.33 1.33 0 011.34 1.34V4m2 0v9.33a1.33 1.33 0 01-1.34 1.34H4.67a1.33 1.33 0 01-1.34-1.34V4" stroke="rgba(255,255,255,0.3)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
              </div>
            ))}
          </div>

          {/* Add/Edit label form */}
          <div style={{padding:"14px",borderRadius:12,background:`rgba(${aR},0.04)`,border:"1px solid rgba(${aR},0.1)"}}>
            <div style={{fontSize:9,color:t.accent,fontFamily:"'Azeret Mono',monospace",letterSpacing:1.5,marginBottom:10,opacity:0.7}}>
              {editingLabel ? "EDIT LABEL" : "NEW LABEL"}
            </div>

            <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:labelForm.hex,flexShrink:0,boxShadow:`0 0 12px ${labelForm.hex}40`}}/>
              <input value={labelForm.label} onChange={e=>setLabelForm(f=>({...f,label:e.target.value}))}
                placeholder="Label name" style={{
                  flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
                  borderRadius:10,padding:"10px 12px",color:"#f4f4f5",fontSize:13,
                  fontFamily:"'Outfit',sans-serif",fontWeight:500,outline:"none"
                }}/>
            </div>

            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {COLOR_PALETTE.map(hex=>(
                <div key={hex} onClick={()=>setLabelForm(f=>({...f,hex}))} style={{
                  width:28,height:28,borderRadius:"50%",background:hex,cursor:"pointer",
                  border: labelForm.hex===hex ? "2.5px solid #fff" : "2.5px solid transparent",
                  boxShadow: labelForm.hex===hex ? `0 0 12px ${hex}60` : "none",
                  transition:"all 0.15s",transform: labelForm.hex===hex ? "scale(1.15)" : "scale(1)"
                }}/>
              ))}
            </div>

            {/* Custom hex input */}
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'Azeret Mono',monospace"}}>CUSTOM</span>
              <input value={labelForm.hex} onChange={e=>setLabelForm(f=>({...f,hex:e.target.value}))}
                maxLength={7} style={{
                  width:90,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
                  borderRadius:8,padding:"6px 10px",color:"#f4f4f5",fontSize:12,
                  fontFamily:"'Azeret Mono',monospace",outline:"none",textAlign:"center"
                }}/>
              <div style={{width:20,height:20,borderRadius:4,background:labelForm.hex,flexShrink:0}}/>
            </div>

            <div style={{display:"flex",gap:8}}>
              {editingLabel && <button onClick={()=>{setEditingLabel(null);setLabelForm({label:"",hex:"#a78bfa"});}} style={{
                flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",
                background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",
                fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif"
              }}>Cancel</button>}
              <button onClick={saveLabel} style={{
                flex:2,padding:10,borderRadius:10,border:"none",cursor:"pointer",
                background:labelForm.label.trim() ? `linear-gradient(135deg, ${labelForm.hex}, ${labelForm.hex}cc)` : "rgba(255,255,255,0.04)",
                color:labelForm.label.trim() ? "#fff" : "rgba(255,255,255,0.2)",
                fontSize:12,fontWeight:600,fontFamily:"'Outfit',sans-serif",
                boxShadow:labelForm.label.trim() ? `0 4px 16px ${labelForm.hex}30` : "none"
              }}>{editingLabel ? "Update Label" : "Add Label"}</button>
            </div>
          </div>
        </div>

        {/* ── THEME ── */}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'Azeret Mono',monospace",letterSpacing:1.5,marginBottom:12}}>THEME</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {THEMES.map(th=>{
              const isActive=themeId===th.id;
              return <button key={th.id} onClick={()=>setThemeId(th.id)} style={{
                padding:"12px 8px",borderRadius:12,border:"none",cursor:"pointer",
                background:th.bg,
                border:isActive?`2px solid ${th.accent}`:"2px solid rgba(255,255,255,0.06)",
                display:"flex",flexDirection:"column",alignItems:"center",gap:6,
                transition:"all 0.2s"
              }}>
                <div style={{display:"flex",gap:3}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:th.accent}}/>
                  <div style={{width:12,height:12,borderRadius:4,background:th.bg2}}/>
                  <div style={{width:12,height:12,borderRadius:"50%",background:th.end}}/>
                </div>
                <span style={{fontSize:9,fontWeight:isActive?700:500,color:isActive?th.accent:th.tx,fontFamily:"'Outfit',sans-serif",opacity:isActive?1:0.5}}>{th.name}</span>
              </button>;
            })}
          </div>
        </div>

        {/* ── APP INFO ── */}
        <div style={{padding:"14px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'Azeret Mono',monospace",letterSpacing:1.5,marginBottom:10}}>APP</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.5)"}}>Forge</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'Azeret Mono',monospace"}}>v0.5 alpha</span>
          </div>
        </div>

        <button onClick={()=>{setShowSettings(false);setEditingLabel(null);}} style={{
          width:"100%",marginTop:18,padding:14,borderRadius:12,border:"none",cursor:"pointer",
          background:`rgba(${aR},0.1)`,color:t.accentL,fontSize:13,fontWeight:600,
          fontFamily:"'Outfit',sans-serif"
        }}>Close Settings</button>
      </div>
    </div>
  );

  // ── MONTH PICKER ──
  const MonthPicker = () => {
    const [py,setPy]=useState(selectedDate.getFullYear());
    const [pm,setPm]=useState(selectedDate.getMonth());
    const first=new Date(py,pm,1).getDay();
    const dim=new Date(py,pm+1,0).getDate();
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowMonthPicker(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:t.bg2,borderRadius:18,padding:20,width:"90%",maxWidth:360,border:"1px solid rgba(${aR},0.12)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <button onClick={()=>{if(pm===0){setPm(11);setPy(y=>y-1)}else setPm(m=>m-1)}} style={{background:"none",border:"none",color:t.accent,fontSize:20,cursor:"pointer",padding:"0 8px"}}>&lsaquo;</button>
            <span style={{fontFamily:"'Outfit',sans-serif",fontWeight:600,fontSize:16,color:"#f4f4f5"}}>{FULL_MONTHS[pm]} {py}</span>
            <button onClick={()=>{if(pm===11){setPm(0);setPy(y=>y+1)}else setPm(m=>m+1)}} style={{background:"none",border:"none",color:t.accent,fontSize:20,cursor:"pointer",padding:"0 8px"}}>&rsaquo;</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
            {DAYS.map(d=><span key={d} style={{fontSize:9,color:"rgba(255,255,255,0.2)",padding:4,fontFamily:"'Azeret Mono',monospace"}}>{d}</span>)}
            {Array.from({length:first},(_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:dim},(_,i)=>{
              const day=i+1;const thisDate=new Date(py,pm,day);const ds=toDateStr(thisDate);const isSel=ds===dateKey;const isTd=isToday(thisDate);
              return <button key={day} onClick={()=>{setSelectedDate(new Date(py,pm,day));setShowMonthPicker(false);}} style={{
                aspectRatio:"1",borderRadius:"50%",border:"none",cursor:"pointer",fontSize:12,fontWeight:isSel?700:400,fontFamily:"'Outfit',sans-serif",
                background:isSel?t.accent:isTd?`rgba(${aR},0.15)`:"transparent",
                color:isSel?"#fff":isTd?t.accentL:"rgba(255,255,255,0.45)"
              }}>{day}</button>;
            })}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{background:t.bg,minHeight:"100vh",color:t.tx,fontFamily:"'Outfit',-apple-system,sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Azeret+Mono:wght@400;500&display=swap');
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{display:none}
        input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
        input[type=number]{-moz-appearance:textfield}
      `}</style>

      <div style={{padding:"20px 20px 8px",background:`linear-gradient(180deg, ${t.accent}10 0%, transparent 100%)`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontFamily:"'Azeret Mono',monospace",fontSize:9.5,fontWeight:500,letterSpacing:2.5,color:t.accent,textTransform:"uppercase",marginBottom:4,opacity:0.7}}>
              {viewingToday?"Today":DAYS[selectedDate.getDay()]} &middot; {MONTHS[selectedDate.getMonth()]} {selectedDate.getDate()}, {selectedDate.getFullYear()}
            </div>
            <div style={{fontSize:24,fontWeight:700,letterSpacing:"-0.8px"}}>
              <span style={{color:t.tx,fontWeight:400,opacity:0.35}}>Hey, </span>
              <span style={{color:t.accent}}>Aaki</span>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
              <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:9.5,color:"rgba(255,255,255,0.3)"}}>{doneCount}/{totalCount}</span>
              <div style={{width:72,height:3,borderRadius:3,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${t.accentD},${t.accent},${t.accentL})`,borderRadius:3,transition:"width 0.4s"}}/>
              </div>
            </div>
            <button onClick={()=>setShowSettings(true)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:7,cursor:"pointer",lineHeight:0}}>
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke="rgba(255,255,255,0.35)" strokeWidth="1.3"/><path d="M17.4 12.2a1.4 1.4 0 00.28 1.54l.05.05a1.7 1.7 0 11-2.4 2.4l-.05-.05a1.4 1.4 0 00-1.54-.28 1.4 1.4 0 00-.85 1.28v.14a1.7 1.7 0 11-3.4 0v-.07A1.4 1.4 0 008.6 16a1.4 1.4 0 00-1.54.28l-.05.05a1.7 1.7 0 11-2.4-2.4l.05-.05a1.4 1.4 0 00.28-1.54 1.4 1.4 0 00-1.28-.85h-.14a1.7 1.7 0 110-3.4h.07A1.4 1.4 0 004 7.06a1.4 1.4 0 00-.28-1.54l-.05-.05a1.7 1.7 0 112.4-2.4l.05.05A1.4 1.4 0 007.66 3.4 1.4 1.4 0 008.5 2.55v-.14a1.7 1.7 0 113.4 0v.07a1.4 1.4 0 00.85 1.28 1.4 1.4 0 001.54-.28l.05-.05a1.7 1.7 0 112.4 2.4l-.05.05a1.4 1.4 0 00-.28 1.54 1.4 1.4 0 001.28.85h.14a1.7 1.7 0 010 3.4h-.07a1.4 1.4 0 00-1.28.85z" stroke="rgba(255,255,255,0.35)" strokeWidth="1.1"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div style={{padding:"6px 20px 8px",display:"flex",alignItems:"center",gap:6}}>
        <button onClick={()=>setShowMonthPicker(true)} style={{background:`rgba(${aR},0.08)`,border:"1px solid rgba(${aR},0.12)",borderRadius:8,padding:"7px 9px",cursor:"pointer",lineHeight:0}}>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke={t.accent} strokeWidth="1.2"/><path d="M1 6H15" stroke={t.accent} strokeWidth="1.2"/><path d="M5 0.5V3.5M11 0.5V3.5" stroke={t.accent} strokeWidth="1.2" strokeLinecap="round"/></svg>
        </button>
        <div style={{display:"flex",gap:3,flex:1,justifyContent:"center"}}>
          {getDateStrip().map((d,i)=>{const isSel=toDateStr(d)===dateKey;const isTd=isToday(d);return(
            <button key={i} onClick={()=>setSelectedDate(new Date(d))} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"5px 7px",borderRadius:10,border:"none",cursor:"pointer",minWidth:34,transition:"all 0.2s",background:isSel?`rgba(${aR},0.15)`:"transparent"}}>
              <span style={{fontFamily:"'Azeret Mono',monospace",fontSize:8,color:isSel?t.accentL:"rgba(255,255,255,0.2)",textTransform:"uppercase"}}>{DAYS[d.getDay()]}</span>
              <span style={{fontSize:14,fontWeight:isSel?700:500,color:isSel?"#f4f4f5":isTd?t.accent:"rgba(255,255,255,0.35)"}}>{d.getDate()}</span>
              {isTd&&!isSel&&<div style={{width:3,height:3,borderRadius:"50%",background:t.accent}}/>}
            </button>);
          })}
        </div>
        <button onClick={()=>setSelectedDate(new Date())} style={{background:viewingToday?`rgba(${aR},0.15)`:"rgba(255,255,255,0.03)",border:"1px solid rgba(${aR},0.12)",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:10,fontWeight:600,color:viewingToday?t.accentL:"rgba(255,255,255,0.25)"}}>Today</button>
      </div>

      <div style={{display:"flex",margin:"0 20px 10px",background:`rgba(${aR},0.05)`,borderRadius:10,padding:3,border:"1px solid rgba(${aR},0.08)"}}>
        {["checklist","timeline"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"8px 0",border:"none",borderRadius:8,fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif",textTransform:"capitalize",background:view===v?`rgba(${aR},0.12)`:"transparent",color:view===v?t.accentL:"rgba(255,255,255,0.25)",transition:"all 0.2s"}}>{v}</button>
        ))}
      </div>

      <div onTouchStart={handleSwipeStart} onTouchEnd={handleSwipeEnd} style={{padding:"0 20px 100px"}}>
        {view==="checklist"&&ChecklistView()}
        {view==="timeline"&&TimelineView()}
      </div>

      {/* FAB: New Event */}
      <button onClick={()=>{setDetailEvent(null);openEdit(true);}} style={{
        position:"fixed",bottom:24,right:24,width:52,height:52,borderRadius:16,border:"none",
        background:`linear-gradient(135deg,${t.accentD},${t.accent})`,color:"#fff",fontSize:28,
        cursor:"pointer",boxShadow:`0 4px 24px ${t.accent}60`,
        display:"flex",alignItems:"center",justifyContent:"center",fontWeight:300,
        zIndex:50,maxWidth:480
      }}>+</button>

      <div style={{position:"fixed",bottom:0,left:0,right:0,height:60,maxWidth:480,margin:"0 auto",pointerEvents:"none",background:`linear-gradient(to top, ${t.bg} 30%, transparent)`}}/>

      {showMonthPicker&&<MonthPicker/>}
      {showSettings&&SettingsPanel()}
      {DetailPopup()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Forge));

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW registered')).catch(e=>console.log('SW error:',e));
}

// PWA Install
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  const b=document.createElement('div');
  b.id='instB';
  b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#111118;border-top:1px solid #1e2330;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;max-width:480px;margin:0 auto';
  b.innerHTML='<div style="display:flex;align-items:center;gap:8px"><div style="font-size:20px">🔥</div><div><div style="font-size:12px;font-weight:600;color:#f1f5f9">Install Forge</div><div style="font-size:10px;color:#64748b">Add to home screen</div></div></div><div style="display:flex;gap:6px"><button onclick="this.closest(\'#instB\').remove()" style="background:none;border:none;color:#64748b;font-size:11px;padding:6px;cursor:pointer">Later</button><button onclick="installApp()" style="background:#a78bfa;border:none;color:#fff;font-size:11px;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer">Install</button></div>';
  document.body.appendChild(b);
});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById('instB');if(b)b.remove();});}
</script>
</body>
</html>
